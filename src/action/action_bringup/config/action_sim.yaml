# Simulation-specific action configuration
# Uses CARLA odometry directly, tuned for simulation dynamics

# =============================================================================
# Lattice Planner (simulation)
# =============================================================================
/**/lattice_planning_node:
  ros__parameters:
    lanelet_ahead_topic: "lanelet_ahead"
    odom_topic: "odom"
    bt_topic: "execute_behaviour"
    path_topic: "path"
    available_paths_topic: "available_paths"
    control_rate_hz: 2.0

    num_lane_switch_horizons: 3
    lane_switch_lookahead_distances: [10.0, 17.5, 25.0]

    centreline_horizon: 35.0
    centreline_velocity_scale: 0.2

    cost_function:
      lateral_movement_weight: 2.0
      physical_limits_weight: 4.0
      preferred_lane_cost: 100.0
      unknown_occupancy_cost: 50.0
      max_curvature_change: 0.1

    path_gen:
      max_iterations: 20
      path_steps: 35
      convergence_tolerance: 0.15
      newton_damping: 0.7
      max_step_size: 1.0

    spiral_coeffs:
      c1_k0_coeff: -11.0
      c1_k1_coeff: 18.0
      c1_k2_coeff: -9.0
      c1_k3_coeff: 2.0
      c1_divisor: 2.0
      c2_k0_coeff: 18.0
      c2_k1_coeff: -45.0
      c2_k2_coeff: 36.0
      c2_k3_coeff: -9.0
      c2_divisor: 2.0
      c3_k0_coeff: -9.0
      c3_k1_coeff: 27.0
      c3_k2_coeff: -27.0
      c3_k3_coeff: 9.0
      c3_divisor: 2.0

# =============================================================================
# Trajectory Planner (simulation)
# =============================================================================
/**/trajectory_planner_node:
  ros__parameters:
    traj_pub_topic: "trajectory"
    marker_pub_topic: "trajectory_markers"
    path_sub_topic: "input_path"
    costmap_sub_topic: "costmap"
    lane_context_sub_topic: "lane_context"
    odom_sub_topic: "odom"
    bt_sub_topic: "execute_behaviour"

    stop_distance: 0.3
    max_speed: 10.0
    max_tangential_accel: 2.5
    max_emergency_accel: 5.0
    max_lateral_accel: 1.0
    interpolation_resolution: 0.1

    footprint_frame: "base_link"
    footprint_x_min: -0.5
    footprint_y_min: -1.2
    footprint_x_max: 3.5
    footprint_y_max: 1.2

# =============================================================================
# Lattice Planning Markers
# =============================================================================
/**/lattice_planning_markers_node:
  ros__parameters:
    path_topic: "path"
    available_paths_topic: "available_paths"
    path_markers_topic: "path_markers"
    available_paths_markers_topic: "available_paths_markers"
    path_line_width: 0.1
    available_path_line_width: 0.1
    available_paths_alpha: 1.0
    max_available_paths: 50
    publish_deleteall_each_update: true

# =============================================================================
# MPC Controller — simulation OVERRIDES (used by action_sim.launch.yaml)
# =============================================================================
# Defaults and the full tuning guide live in the mpc_controller package:
#   mpc_controller/config/mpc_controller.yaml
# The launch file loads that first, then this file, so only the parameters that
# differ from the defaults for CARLA simulation need to be listed here.
#
/**/mpc_controller_node:
  ros__parameters:
    disable_standby: true     # sim has no behaviour-tree gating; let MPC drive immediately.
    invert_steering: true     # CARLA's steering sign is opposite the controller convention.
    max_speed: 10.0           # [1.0 - 30.0] m/s — lower global cap for sim.
    max_steering_rate: 0.5    # [0.1 - 1.5] rad/s — sim platform tolerates quicker steering.
