# Interfacing CAN Configuration
# Consolidated config for all CAN/control nodes launched by interfacing_can.launch.yaml.

# Dummy Ackermann nodes (used by test_steering / test_velocity modes)
/**/ackermann_square_wave:
  ros__parameters:
    period: 5.0
    amplitude: 0.2
    publish_rate: 50.0

/**/ackermann_velocity_trapezoid:
  ros__parameters:
    target_velocity: 2.22
    rise_time: 1.0
    hold_time: 4.0
    ramp_down_time: 1.0
    down_hold_time: 1.0
    publish_rate: 50.0

# Joystick hardware node
/**/joy_node:
  ros__parameters:
    deadzone: 0.05

# Joystick interfacing node
/**/joystick_node:
  ros__parameters:
    # left shoulder buttons
    enable_axis: 2

    # button to toggle between joystick/ackermann and joystick/roscco
    toggle_button: 1  # B on xbox

    # OSCC board arming button
    arming_button: 0  # A on xbox

    # left and right joystick axes
    steering_axis: 0
    throttle_axis: 4

    # ACKERMANN SCALING ---- max speed and steering angle
    ackermann_max_speed: 2.0
    ackermann_max_steering_angle: 0.5

    # ROSCCO SCALING ---- max speed and steering angle
    roscco_max_speed: 1.0
    roscco_max_steering_angle: 0.5

    # invert steering and throttle
    invert_steering: true
    invert_throttle: false

    # vibration feedback
    toggle_vibration_intensity: 1.0
    toggle_vibration_duration_ms: 150

# Ackermann Mux
/**/ackermann_mux:
  ros__parameters:
    safety_threshold: 0.5

    emergency:
      steering_angle: 0.0
      speed: -0.5

    publish_rate_hz: 50.0

    #HIGHER NUMBER == higher priority
    inputs:
      joystick:
        topic: joystick/ackermann
        priority: 100
        has_mask: true
        mask_topic: joystick/is_idle
        safety_gating: true

      action:
        topic: action/ackermann
        priority: 10
        has_mask: true
        mask_topic: action/is_idle
        safety_gating: false

      # Used by test_steering / test_velocity dummy nodes (inactive in production)
      dummy:
        topic: dummy/ackermann
        priority: 200
        has_mask: false
        safety_gating: false

# PID Control
/**/pid_control_node:
  ros__parameters:
    update_rate: 20.0
    steering_pid:
      p: 5.0  # Proportional gain
      i: 0.0  # Integral gain
      d: 0.15 # Derivative gain
      i_clamp_max: 1.0  # Upper bound for the integrator term (prevents windup independently of output)
      i_clamp_min: -1.0 # Lower bound for the integrator term
      u_clamp_max: 1.0  # Upper saturation limit for the controller output (actuator limit)
      u_clamp_min: -1.0 # Lower saturation limit for the controller output
      saturation: true  # Whether to treat u_clamp limits as enforced saturation
      antiwindup: true  # Enable anti-windup to correct the integrator during saturation
      antiwindup_strategy: "conditional_integration"

    velocity_pid:
      p: 1.0
      i: 0.0
      d: 0.0
      i_clamp_max: 0.5
      i_clamp_min: -0.5
      u_clamp_max: 1.0
      u_clamp_min: -1.0
      saturation: true
      antiwindup: true
      antiwindup_strategy: "conditional_integration"

# Velocity-Driven Feedforward PID Control
/**/vel_driven_feedforward_pid_node:
  ros__parameters:
    update_rate: 20.0
    output_clamp_max: 1.0
    output_clamp_min: -1.0
    steering_pid:
      p: 3.0
      i: 0.0
      d: 0.0
      i_clamp_max: 1.0
      i_clamp_min: -1.0
      u_clamp_max: 1.0
      u_clamp_min: -1.0
      saturation: true
      antiwindup: true
      antiwindup_strategy: "conditional_integration"
    velocity_pid:
      p: 1.0
      i: 0.0
      d: 0.0
      i_clamp_max: 0.5
      i_clamp_min: -0.5
      u_clamp_max: 1.0
      u_clamp_min: -1.0
      saturation: true
      antiwindup: true
      antiwindup_strategy: "conditional_integration"
    velocity_output:
      throttle_scale: 1.0  # Scale factor for positive PID effort → throttle
      brake_scale: 0.5     # Scale factor for negative PID effort → brake (brake is more aggressive)
      deadband: 0.02       # PID effort below this → coast (no throttle, no brake)
    # T_ff = (c0 + c1*v + c2*v^2) * delta + friction_offset * sign(delta)
    # Model B symmetric fit (R²=0.845, 63182 samples)
    # 90 perturbations at ±2% scaling from baseline (100%)
    feedforward:
