---
launch:
  - arg:
      name: "autostart"
      default: "true"
      description: "Automatically configure and activate managed nodes"

  - arg:
      name: "bond_enabled"
      default: "false"
      description: "Enable bond-based crash detection"

  - arg:
      name: "config_file"
      default: "$(find-pkg-share interfacing_bringup)/config/interfacing_can.yaml"
      description: "Path to the CAN/control configuration file"

  - arg:
      name: "test_steering"
      default: "false"
      description: "Launch steering square-wave dummy node for testing"

  - arg:
      name: "test_velocity"
      default: "false"
      description: "Launch velocity trapezoid dummy node for testing"

  # --- Test dummy nodes (conditional) ---

  # Steering square-wave dummy (publishes through ackermann mux via dummy/ackermann)
  - node:
      if: "$(var test_steering)"
      pkg: dummy_ackermann
      exec: ackermann_square_wave_node
      name: ackermann_square_wave
      namespace: interfacing
      output: screen
      remap:
        - from: "ackermann"
          to: "dummy/ackermann"
      param:
        - from: "$(var config_file)"

  # Velocity trapezoid dummy (publishes through ackermann mux via dummy/ackermann)
  - node:
      if: "$(var test_velocity)"
      pkg: dummy_ackermann
      exec: ackermann_velocity_trapezoid_node
      name: ackermann_velocity_trapezoid
      namespace: interfacing
      output: screen
      remap:
        - from: "ackermann"
          to: "dummy/ackermann"
      param:
        - from: "$(var config_file)"

  # --- Common CAN / control nodes ---

  # Joystick hardware node (publishes joy messages from physical joystick)
  - node:
      pkg: "joy"
      exec: "joy_node"
      name: "joy_node"
      namespace: "interfacing"
      param:
        - from: "$(var config_file)"

  # Joystick interfacing node (converts joy to joystick/ackermann)
  - node:
      pkg: "joystick_interfacing"
      exec: "joystick_interfacing_node"
      name: "joystick_node"
      namespace: "interfacing"
      output: "screen"
      ros_args: "--log-level warn"
      param:
        - from: "$(var config_file)"

  # Ackermann Mux Node
  - node:
      pkg: "ackermann_mux"
      exec: "ackermann_mux_node"
      name: "ackermann_mux"
      namespace: "interfacing"
      output: "screen"
      ros_args: "--log-level warn"
      param:
        - from: "$(var config_file)"

  # PID Control Node
  - node:
      pkg: "pid_control"
      exec: "pid_control_node"
      name: "pid_control_node"
      namespace: "interfacing"
      output: "screen"
      remap:
        - from: "steering_feedback"
          to: "can_state_estimator/steering_angle"
        - from: "velocity_feedback"
          to: "can_state_estimator/body_velocity"
      param:
        - from: "$(var config_file)"

  # --- ALTERNATIVE: Velocity-Driven Feedforward PID ---
  # Uncomment this and comment out pid_control_node above to use feedforward PID.
  # Also swap the lifecycle manager entry below.
  # - node:
  #     pkg: "pid_control"
  #     exec: "vel_driven_feedforward_pid_node"
  #     name: "vel_driven_feedforward_pid_node"
  #     namespace: "interfacing"
  #     output: "screen"
  #     remap:
  #       - from: "steering_feedback"
  #         to: "can_state_estimator/steering_angle"
  #       - from: "velocity_feedback"
  #         to: "can_state_estimator/body_velocity"
  #       - from: "odom_feedback"
  #         to: "/novatel/oem7/odom"
  #     param:
  #       - from: "$(var config_file)"

  # --- ALTERNATIVE: Gain-Scheduled PID ---
  # Uncomment this and comment out pid_control_node above to use gain-scheduled PID.
  # Also swap the lifecycle manager entry below.
  # - node:
  #     pkg: "pid_control"
  #     exec: "gain_scheduled_pid_node"
  #     name: "gain_scheduled_pid_node"
  #     namespace: "interfacing"
  #     output: "screen"
  #     remap:
  #       - from: "steering_feedback"
  #         to: "can_state_estimator/steering_angle"
  #       - from: "velocity_feedback"
  #         to: "can_state_estimator/body_velocity"
  #       - from: "odom_feedback"
  #         to: "/novatel/oem7/odom"
  #     param:
  #       - from: "$(var config_file)"

  # OSCC interfacing Node
  - node:
      pkg: "oscc_interfacing"
      exec: "oscc_interfacing_node"
      name: "oscc_interfacing"
      namespace: "interfacing"
      param:
        - from: "$(var config_file)"

  # CAN State Estimator (steering angle + velocity + odometry from CAN bus)
  - node:
      pkg: can_state_estimator
      exec: can_state_estimator_node
      name: can_state_estimator_node
      namespace: interfacing
      output: screen
      param:
        - from: "$(var config_file)"

  # Lifecycle Manager
  - node:
      pkg: wato_lifecycle_manager
      exec: wato_lifecycle_manager_node
      name: interfacing_lifecycle_manager
      output: screen
      param:
        - name: node_names
          value:
            - /interfacing/joystick_node
            - /interfacing/ackermann_mux
            - /interfacing/can_state_estimator_node
            - /interfacing/pid_control_node
        - name: autostart
          value: $(var autostart)
        - name: transition_timeout_s
          value: 10.0
        - name: bond_timeout_s
          value: 4.0
        - name: bond_enabled
          value: $(var bond_enabled)
