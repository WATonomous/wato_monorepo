#
# Standalone CAN/controls entry point (includes TF transforms).
# Also supports test modes via test_steering / test_velocity args.
#
# Examples:
#   ros2 launch interfacing_bringup joystick.launch.yaml
#   ros2 launch interfacing_bringup joystick.launch.yaml test_steering:=true
#   ros2 launch interfacing_bringup joystick.launch.yaml test_velocity:=true
---
launch:
  - arg:
      name: "autostart"
      default: "true"
  - arg:
      name: "bond_enabled"
      default: "false"
  - arg:
      name: "config_file"
      default: "$(find-pkg-share interfacing_bringup)/config/interfacing_can.yaml"
  - arg:
      name: "test_steering"
      default: "false"
  - arg:
      name: "test_velocity"
      default: "false"

  # Eve Robot Description
  - include:
      file: "$(find-pkg-share eve_description)/launch/tf_publish.yaml"

  # CAN / Controls
  - include:
      file: "$(find-pkg-share interfacing_bringup)/launch/interfacing_can.launch.yaml"
      arg:
        - name: "autostart"
          value: "$(var autostart)"
        - name: "bond_enabled"
          value: "$(var bond_enabled)"
        - name: "config_file"
          value: "$(var config_file)"
        - name: "test_steering"
          value: "$(var test_steering)"
        - name: "test_velocity"
          value: "$(var test_velocity)"
