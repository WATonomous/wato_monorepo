---
launch:
  - arg:
      name: "config_file"
      default: "$(find-pkg-share interfacing_bringup)/config/interfacing.yaml"
      description: "Path to the CAN/control configuration file"

  # Sensors (GPS, LiDAR, cameras, TF)
  - include:
      file: "$(find-pkg-share interfacing_bringup)/launch/interfacing_sensors.launch.yaml"

  # CAN / Controls (joystick, ackermann mux, PID, OSCC, CAN state estimator)
  - include:
      file: "$(find-pkg-share interfacing_bringup)/launch/interfacing_can.launch.yaml"
      arg:
        - name: "config_file"
          value: "$(var config_file)"

  # Topic Healthchecker (monitors topic liveness and message rates)
  - node:
      pkg: topic_healthchecker
      exec: topic_healthchecker_node
      name: topic_healthchecker
      namespace: interfacing
      output: screen
      param:
        - from: "$(var config_file)"
        - name: http_port
          value: $(env TOPIC_HEALTHCHECKER__PORT)
