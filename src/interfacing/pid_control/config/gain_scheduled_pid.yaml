gain_scheduled_pid_node:
  ros__parameters:
    update_rate: 20.0

    output_clamp_max: 1.0
    output_clamp_min: -1.0

    gain_schedule:
      speed_breakpoints: [0.0, 5.0, 10.0, 15.0, 20.0]
      # Flat row-major N x 3 matrix: [P, I, D] per speed breakpoint
      steering_gains_matrix: [
        2.5, 0.0, 0.1,
        2.5, 0.0, 0.1,
        3.0, 0.0, 0.15,
        3.5, 0.0, 0.2,
        4.0, 0.0, 0.25
      ]
      i_clamp_max: 1.0
      i_clamp_min: -1.0
      antiwindup: true

    velocity_pid:
      p: 1.0
      i: 0.1
      d: 0.01
      i_clamp_max: 0.5
      i_clamp_min: -0.5
      u_clamp_max: 1.0
      u_clamp_min: -1.0
      saturation: true
      antiwindup: true
      antiwindup_strategy: "conditional_integration"

    velocity_output:
      throttle_scale: 1.0
      brake_scale: 0.5
      deadband: 0.02
