vel_driven_feedforward_pid_node:
  ros__parameters:
    update_rate: 20.0

    output_clamp_max: 1.0   # Total steering command limit (PID + FF combined)
    output_clamp_min: -1.0

    steering_pid:
      p: 2.5
      i: 0.0
      d: 0.1
      i_clamp_max: 1.0
      i_clamp_min: -1.0
      u_clamp_max: 1.0
      u_clamp_min: -1.0
      saturation: true
      antiwindup: true
      antiwindup_strategy: "conditional_integration"

    velocity_pid:
      p: 1.0
      i: 0.1
      d: 0.01
      i_clamp_max: 0.5
      i_clamp_min: -0.5
      u_clamp_max: 1.0
      u_clamp_min: -1.0
      saturation: true
      antiwindup: true
      antiwindup_strategy: "conditional_integration"

    steering_d_on_measurement: 0.1  # D-on-measurement gain (set control_toolbox d to 0)
    velocity_filter_alpha: 0.2     # EMA filter on velocity measurement (0.0=no update, 1.0=no filter)

    velocity_output:
      throttle_scale: 1.0
      brake_scale: 0.5
      deadband: 0.02

    # T_ff = (c0 + c1*v + c2*v^2) * steering_setpoint + friction_offset * sign(steering_setpoint)
    # Symmetric Model B fit (R²=0.845, RMSE=0.046, 63182 samples)
    feedforward:
      coefficients: [-0.137961, 0.097721, -0.002266]
      friction_offset: 0.049855
