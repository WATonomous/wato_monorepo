vel_driven_feedforward_pid_node:
  ros__parameters:
    update_rate: 20.0

    output_clamp_max: 1.0   # Total steering command limit (PID + FF combined)
    output_clamp_min: -1.0

    steering_pid:
      p: 2.5
      i: 0.0
      d: 0.1
      i_clamp_max: 1.0
      i_clamp_min: -1.0
      u_clamp_max: 1.0
      u_clamp_min: -1.0
      saturation: true
      antiwindup: true
      antiwindup_strategy: "conditional_integration"

    velocity_pid:
      p: 1.0
      i: 0.1
      d: 0.01
      i_clamp_max: 0.5
      i_clamp_min: -0.5
      u_clamp_max: 1.0
      u_clamp_min: -1.0
      saturation: true
      antiwindup: true
      antiwindup_strategy: "conditional_integration"

    # T_ff = (c0 + c1*v + c2*v^2 + ...) * steering_setpoint
    # Examples: [0.0] = disabled, [0.0, k2, k1] = (k1*v^2 + k2*v)*δ
    feedforward:
      coefficients: [0.0]
