# CARLA ROS2 Bridge Configuration - SIL (Software-In-the-Loop) component testing
#
# Trimmed bridge config for closed-loop component SIL. The scenario itself
# (map, ego, actors, weather, seed) is supplied by a YAML file pointed to by the
# SIL_SCENARIO_FILE environment variable and loaded via the yaml_scenario plugin.

/**/scenario_server:
  ros__parameters:
    carla_host: "localhost"
    carla_timeout: 10.0
    initial_scenario: "carla_scenarios.scenarios.yaml_scenario"
    # Deterministic synchronous stepping for reproducible runs
    carla_fps: 60.0
    synchronous_mode: true
    no_rendering_mode: true          # headless; SIL review happens via bag playback
    substepping: true
    max_substep_delta_time: 0.001
    max_substeps: 10

# Ackermann Control - applies the controller-under-test's command to the ego
/**/ackermann_control:
  ros__parameters:
    carla_host: "localhost"
    carla_timeout: 10.0
    role_name: "ego_vehicle"
    command_timeout: 0.5
    control_rate: 50.0

# Ground-truth localization (TF map -> odom -> base_footprint, /ego/odom)
/**/carla_localization:
  ros__parameters:
    carla_host: "localhost"
    carla_timeout: 10.0
    role_name: "ego_vehicle"
    map_frame: "map"
    odom_frame: "odom"
    base_frame: "base_footprint"
    publish_rate: 50.0

# Ground-truth actor bounding boxes (used by the SIL monitor + Foxglove)
/**/bbox_publisher:
  ros__parameters:
    carla_host: "localhost"
    carla_timeout: 10.0
    publish_rate: 10.0
    frame_id: "map"
    include_vehicles: true
    include_pedestrians: true
    include_traffic_lights: false
    include_parked_vehicles: true
    max_distance: -1.0
