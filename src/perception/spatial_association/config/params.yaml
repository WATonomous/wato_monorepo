spatial_association:
  ros__parameters:
    # Lidar frame for the point cloud (must match sensor_interfacing, e.g. lidar_cc).
    # Camera<->lidar transforms are read from TF (published by sensor_interfacing).
    lidar_frame: lidar_cc

    # Max allowed |detection.stamp - cloud.stamp| in seconds; 0 = disabled. When > 0, associations
    # are skipped when exceeded to reduce ghost associations (camera/lidar often unsynced, so default 0).
    max_detection_cloud_stamp_delta: 0.0

    # filtering parameters

    euclid_params:
      cluster_tolerance: 0.20
      #This defines the maximum distance between two points for them to be considered part of the same cluster
      min_cluster_size: 20 # small values create more noise
      max_cluster_size: 800 # big values slightly slow down performance
      use_adaptive_clustering: true  # Use larger tolerance for closer points to prevent fragmentation
      close_threshold: 10.0  # Distance (m) threshold for close objects
      close_tolerance_mult: 1.5  # Multiplier for close objects (e.g., 1.5x = 0.30m for close objects)

    merge_threshold: 1.0
    # the threshold distance between two clusters centroids for them to be merged into one cluster

    object_detection_confidence: 0.52  # Lowered to recover more matches; tune up if false associations spike

    # Voxel downsampling parameter
    voxel_size: 0.2  # Fixed voxel size (meters) for downsampling

    # Quality filtering parameters (improved physics-based filtering)
    quality_filter_params:
      max_distance: 60.0  # Maximum detection distance in meters
      min_points: 5  # Minimum points for viable object
      min_height: 0.15  # Minimum height in meters
      min_points_default: 10  # Default minimum points
      min_points_far: 8  # Minimum points at far distance (> 30m)
      min_points_medium: 12  # Minimum points at medium distance (> 20m)
      min_points_large: 30  # Minimum points for large objects
      distance_threshold_far: 30.0  # Distance threshold for far objects (m)
      distance_threshold_medium: 20.0  # Distance threshold for medium objects (m)
      volume_threshold_large: 8.0  # Volume threshold for large objects (m³)
      min_density: 5.0  # Minimum point density (points per m³)
      max_density: 1000.0  # Maximum point density (points per m³)
      max_dimension: 15.0  # Maximum object dimension in meters
      max_aspect_ratio: 15.0  # Maximum aspect ratio (length/width or length/height)

    publish_bounding_box: true  # Publish /bounding_box MarkerArray topic
    publish_visualization: false  # Publish debug topics (filtered clusters, centroids)

    # Enable verbose point-cloud debug logs
    debug_logging: false

    # Projection/utils (orientation, ground filter, merge, IoU, visualization)
    projection_utils_params:
      marker_lifetime_s: 0.25       # Viz only
      marker_alpha: 0.2             # Viz only
      min_iou_threshold: 0.11       # Association: min IoU cluster<->2D; raised from 0.15 to recover more matches
      min_camera_z_distance: 0.8    # Association: reject points behind camera (m); slightly relaxed from 1.0
      detection_score_weight: 0.6  # 3D score = detection_score_weight * det_score + iou_score_weight * iou
      iou_score_weight: 0.4
      ar_front_view_threshold: 1.2  # Orientation: if box aspect ratio < this use line-of-sight yaw (front view)
      min_points_for_fit: 3         # Min points to run orientation search; leave default
      default_sample_point_count: 64 # Points sampled for orientation search; more = slower, more stable
      orientation_search_step_degrees: 2.0  # Fine step for angle search; smaller = more accurate box, slightly slower
      outlier_rejection_point_count: 30  # Below this many points, apply sigma clipping in box fit; higher = reject outliers in more clusters
      outlier_sigma_multiplier: 4.5 # Clamp points beyond mean ± this*sigma in fit; lower = more aggressive outlier rejection
      # Trimmed extents (percentiles 0–100): use 5th/95th for XY and 2nd/98th for Z to stabilize box size/center vs outliers
      xy_extent_percentile_low: 5.0
      xy_extent_percentile_high: 95.0
      z_extent_percentile_low: 2.0
      z_extent_percentile_high: 98.0
      # Image dimensions for projection clipping (from CameraInfo or config). Must match camera resolution.
      image_width: 1280
      image_height: 1024
      # Second-pass fallback for unassigned detections (optional; set true to recover more matches)
      enable_second_pass_fallback: false
      second_pass_min_iou: 0.05  # Relaxed IoU or centroid-in-box; only when enable_second_pass_fallback is true
      max_unassigned_detections_second_pass: 10  # Cap second-pass work to avoid becoming a bottleneck
