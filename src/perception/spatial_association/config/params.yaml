spatial_association:
  ros__parameters:
    # Lidar frame for the point cloud (must match sensor_interfacing, e.g. lidar_cc).
    # Camera<->lidar transforms are read from TF (published by sensor_interfacing).
    lidar_frame: lidar_cc

    # Max allowed |detection.stamp - cloud.stamp| in seconds; ≤0 disables per-camera rejection (nearest cached cloud
    # is still used). Batch time = MultiDetection2DArray.header.stamp if set, else median of per-camera stamps.
    # Slightly wider window reduces dropped camera/cloud pairs when sync jitters (fewer “missing” 3D boxes).
    max_detection_cloud_stamp_delta: 0.10

    # When MultiDetection2DArray.header.stamp is zero/unset, fallback batch-time policy:
    # - median_camera_stamp (default): robust against one delayed camera
    # - max_camera_stamp: lowest-latency choice using newest valid per-camera stamp
    detection_stamp_fallback_policy: "median_camera_stamp"

    # Ring buffer of recent clustered LiDAR snapshots (async worker vs detection callback). Order-of-magnitude: keep
    # enough frames to span max_detection_cloud_stamp_delta at your LiDAR rate (e.g. 0.08 s × 20 Hz ≈ 2 frames min;
    # use a larger buffer when processing lags).
    clustered_cloud_cache_size: 24

    # Raw non-ground clouds queued for the worker (used only when raw_cloud_latest_only is false). When full, oldest
    # pending clouds are dropped. Default 1 favors low latency over queuing intermediate scans.
    raw_cloud_pending_queue_size: 1

    # If true (default), each new non-ground cloud replaces all pending raw jobs so the worker always processes the
    # freshest scan; additionally, stale in-flight worker results are dropped when a newer cloud seq is seen before
    # cache insert/publish. Set false to use a bounded FIFO of size raw_cloud_pending_queue_size (better temporal
    # coverage, higher latency when the worker falls behind).
    raw_cloud_latest_only: true

    # If true, /bounding_box marker headers use the detection batch time (RViz looks less “behind” the image).
    # /detection_3d still uses the LiDAR snapshot stamp — markers and 3D messages can disagree; this does not improve
    # real temporal matching, only display. Treat as a UI/debug knob.
    bbox_markers_use_detection_stamp: false


    # If true, skip publish when (detection batch time, cloud stamp) repeats.
    # This avoids redundant marker replacement/flicker from repeated worker runs on the same inputs.
    skip_repeat_association_publish: true

    # filtering parameters

    euclid_params:
      # Pedestrians: few returns after voxel + ROI — keep min_cluster_size moderate (too high drops person-sized clusters).
      cluster_tolerance: 0.25
      min_cluster_size: 14
      roi_min_cluster_size: 4  # ROI-first path: signs/lights often have very few points after voxelization
      max_cluster_size: 1000
      use_adaptive_clustering: true  # Radial bands: tighter tolerance near ego, looser far (see close/mid/far multipliers)
      # Banding uses horizontal range hypot(x,y) in lidar frame (Z ignored). Overlap reduces splits at boundaries.
      close_threshold: 10.0  # Near band [0, close_threshold); e.g. 11 with overlaps 2/4 gives ~near<11, mid from 9, far from 23 when mid_threshold 27
      mid_threshold: 25.0  # Mid band upper bound (exclusive); set <= close_threshold for near + far only
      band_near_mid_overlap_m: 2.0   # Mid also gets [close_threshold - overlap, mid_threshold); 0 = disjoint bands
      band_mid_far_overlap_m: 4.0    # Far also gets [mid_threshold - overlap, inf); 0 = far starts at mid_threshold
      # Lower allows more boundary-split cluster merges; centroid+Z fallback still guards against bad merges.
      band_merge_min_index_overlap: 0.28
      close_tolerance_mult: 0.65  # Near-band multiplier on cluster_tolerance (< 1 splits adjacent close objects)
      mid_tolerance_mult: 1.125
      far_tolerance_mult: 1.75

    merge_threshold: 0.1  # Tighter default to reduce accidental fusing of nearby objects

    # If true: cluster LiDAR points inside each 2D ROI (per camera) to build candidate pools, then run
    # Hungarian assignment over those ROI candidates (one-to-one with detections).
    # If false: cluster full voxel cloud, then run strict IoU association on global candidates.
    use_roi_first_clustering: true
    # If true with ROI-first enabled, skip voxel downsampling and keep full cleaned point density for ROI extraction.
    skip_voxel_for_roi_first: true

    # After all cameras: merge 3D outputs that share the same LiDAR points (or weak overlap + same class + close BEV center).
    cross_camera_dedup:
      enabled: true
      min_lidar_index_overlap: 0.5       # |A∩B| / min(|A|,|B|) on filtered-cloud indices
      weak_lidar_index_overlap: 0.22     # needs same class_id and max_center_dist_m
      max_center_dist_m: 1.8             # BEV XY meters for weak-overlap path only
      # Footprint IoU (axis-aligned rect of oriented box in lidar XY) — catches same object with disjoint LiDAR clusters
      min_bev_box_iou: 0.16
      min_bev_box_iou_no_class: 0.30     # when both lack class_id (stricter)
      min_z_overlap_ratio: 0.20          # require some vertical overlap for BEV-IoU dedup to avoid bridge/underpass false merges

    # Pedestrian 2D scores are often lower than vehicles; keep this modest so person detections still enter association.
    object_detection_confidence: 0.32

    # Slightly finer than 0.2 helps thin / distant pedestrians (more points before clustering). Increase if CPU is tight.
    voxel_size: 0.18

    # Quality filtering parameters (improved physics-based filtering)
    quality_filter_params:
      max_distance: 60.0  # Maximum detection distance in meters
      min_points: 4  # Floor for post-match filter; persons can be point-poor after downsample
      min_height: 0.12  # Allow shorter vertical extent (partial scans / near ground)
      min_points_default: 8  # Tier used in strict association + class-aware filter
      min_points_far: 6  # Far pedestrians (> 30 m)
      min_points_medium: 8  # Medium range (> 20 m)
      min_points_large: 30  # Minimum points for large objects
      distance_threshold_far: 30.0  # Distance threshold for far objects (m)
      distance_threshold_medium: 20.0  # Distance threshold for medium objects (m)
      volume_threshold_large: 8.0  # Volume threshold for large objects (m³)
      # High min_density rejects small-volume clusters; persons are borderline — keep moderate.
      min_density: 5.0
      max_density: 1000.0  # Maximum point density (points per m³)
      # Only enforce min_density for clusters up to this AABB volume (m³); larger objects keep only max_density check.
      density_lower_bound_max_volume: 12.0
      max_dimension: 15.0  # Maximum object dimension in meters
      # Tall thin LiDAR clusters (common for people) can exceed 15:1; relax vs vehicles-only tuning.
      max_aspect_ratio: 22.0

    # Visualization toggles (independent)
    publish_bounding_box: true   # 3D bounding box marker visualization (/bounding_box MarkerArray)
    publish_visualization: false # Debug point-cloud topics (filtered lidar, cluster centroids)
    publish_image_visualization: false  # Image visualization: subscribe to multi_image and use for image overlays (off by default)

    # Enable verbose point-cloud debug logs
    debug_logging: false

    # Projection/utils (orientation, ground filter, merge, IoU, visualization)
    projection_utils_params:
      marker_lifetime_s: 0.25       # Viz only
      marker_alpha: 0.2             # Viz only
      # Small 2D person boxes yield low IoU vs projected hull; slightly lower than vehicle-tuned 0.13.
      min_iou_threshold: 0.25
      min_camera_z_distance: 0.8    # Association: reject points behind camera (m); slightly relaxed from 1.0
      # Used only when association_score is unavailable (fallback path).
      detection_score_weight: 0.6
      iou_score_weight: 0.4
      ar_front_view_threshold: 1.2  # Orientation: if box aspect ratio < this use line-of-sight yaw (front view)
      min_points_for_fit: 3         # Min points to run orientation search; leave default
      default_sample_point_count: 64 # Points sampled for orientation search; more = slower, more stable
      orientation_search_step_degrees: 2.0  # Fine step for angle search; smaller = more accurate box, slightly slower
      # Outlier sigma-clipping runs only when cluster size < this (see cluster_box_utils). Lower = fewer small person clusters distorted.
      outlier_rejection_point_count: 20
      outlier_sigma_multiplier: 3.5 # Clamp points beyond mean ± this*sigma in fit; lower = more aggressive outlier rejection
      # Trimmed extents (percentiles 0–100): use 5th/95th for XY and 2nd/98th for Z to stabilize box size/center vs outliers
      xy_extent_percentile_low: 10.0
      xy_extent_percentile_high: 90.0
      z_extent_percentile_low: 2.0
      z_extent_percentile_high: 98.0
      # Image dimensions for projection clipping (from CameraInfo or config). Must match camera resolution.
      image_width: 1280
      image_height: 1024
      # Second pass: runs after greedy primary assignment for detections still unmatched (helps missed 2D→3D).
      enable_second_pass_fallback: true
      second_pass_min_iou: 0.05  # Floor for relaxed IoU / centroid-in-box rescue path
      second_pass_bbox_expand_fraction: 0.18  # Expand 2D box for second-pass geometry checks
      max_unassigned_detections_second_pass: 18  # Cap work per frame
      second_pass_min_combined_score: 0.38     # Easier rescue for small / weak IoU pedestrian candidates
      second_pass_best_second_margin: 0.06
      # Defaults (1.2) tighten second pass for person vs vehicle — use <1 so pedestrians are not penalized vs generic rescue.
      second_pass_person_inside_points_scale: 0.88
      second_pass_person_inside_fraction_scale: 0.90
      second_pass_person_min_size_score: 0.36   # Projected LiDAR footprint vs tiny 2D person box often mismatches

      # Strict primary association (weighted soft penalties + combined-score floor).
      # Active for both global-clustering and ROI-first candidate pools:
      # ROI-first uses per-detection best-pair selection; global mode keeps Hungarian.
      association_strict_matching: true
      # Persons: centroid projection often off-center in a tall 2D box; keep inner gate generous.
      association_centroid_inner_box_fraction: 0.88
      # Few projected points per ROI for people — do not require half the points inside the 2D rect.
      association_min_inside_point_fraction: 0.60
      # Tall narrow 2D “person” vs wider projected point hull from LiDAR: keep AR gate loose.
      association_min_ar_consistency_score: 0.45
      # Strict-pass minimum score after penalties (raise to reduce false positives).
      association_min_combined_score_strict: 0.35
      association_use_point_projection_rect_for_iou: false
      association_allow_aabb_centroid_fallback: false  # No synthetic IoU when 8-corner AABB fails
      # Keep strict pass authoritative to reduce false positives; set false only if recall drops too much.
      association_suppress_second_pass_under_strict: true
      # Small person boxes need extra margin to collect enough LiDAR in ROI-first mode.
      # ROI-first also applies depth-band gating before clustering and a post-match depth consistency check.
      association_roi_expand_fraction: 0.05
      # Soft-claim reuse penalty scale for ROI-first candidate scoring (0 disables penalty; 1 max effect).
      association_roi_soft_claim_penalty_scale: 0.60
      # Assumed real-world object heights used by ROI-first depth prior from 2D bbox height.
      assumed_height_person_m: 1.7
      assumed_height_car_m: 1.5
      assumed_height_truck_bus_m: 3.0
      assumed_height_bus_m: 3.4
      assumed_height_traffic_control_m: 0.6

      # Post-match class caps (3D AABB), used with matched detection class_id — slightly loose for pose, arms, clutter
      quality_person_max_height_m: 3.5
      quality_person_max_footprint_xy_m: 1.5
      quality_vehicle_max_height_m: 3.0
      quality_vehicle_max_footprint_xy_m: 5.5
      quality_sign_max_height_m: 4.5
      quality_sign_max_footprint_xy_m: 1.5
