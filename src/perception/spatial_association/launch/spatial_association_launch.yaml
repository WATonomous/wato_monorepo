---
launch:
  # Topic remap arguments (remap in launch; node uses relative names)
  - arg:
      name: multi_image
      default: "/multi_camera_sync/multi_image_raw"
      description: "Batched camera images from camera_sync (deep_ros)"
  - arg:
      name: non_ground_cloud
      default: "/non_ground_cloud"
      description: "Non-ground point cloud from patchwork"
  - arg:
      name: detections
      default: "/detections"
      description: "Per-camera 2D detections from deep_object_detection (deep_ros)"
  - arg:
      name: filtered_lidar
      default: "/filtered_lidar"
      description: "Filtered LiDAR visualization (when publish_visualization enabled)"
  - arg:
      name: cluster_centroid
      default: "/cluster_centroid"
      description: "Cluster centroid visualization (when publish_visualization enabled)"
  - arg:
      name: bounding_box
      default: "/bounding_box"
      description: "Bounding box markers (when publish_visualization enabled)"
  - arg:
      name: detection_3d
      default: "/detection_3d"
      description: "3D detections output"

  # Launch the Spatial Association node
  - node:
      pkg: spatial_association
      exec: spatial_association_node
      name: spatial_association_node
      output: screen
      param:
        - from: $(find-pkg-share spatial_association)/config/params.yaml
      remap:
        - from: multi_image
          to: $(var multi_image)
        - from: non_ground_cloud
          to: $(var non_ground_cloud)
        - from: detections
          to: $(var detections)
        - from: filtered_lidar
          to: $(var filtered_lidar)
        - from: cluster_centroid
          to: $(var cluster_centroid)
        - from: bounding_box
          to: $(var bounding_box)
        - from: detection_3d
          to: $(var detection_3d)
