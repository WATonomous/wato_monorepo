launch:
  - arg:
      name: config_file
      default: $(find-pkg-share perception_bringup)/config/perception_sim.yaml
      description: Path to the perception configuration file

  - arg:
      name: autostart
      default: "true"
      description: Automatically configure and activate managed nodes

  - arg:
      name: bond_enabled
      default: "false"
      description: Enable bond-based crash detection

  # topic arguments for tracking
  - arg:
      name: tracking_detections_topic
      default: /perception/detections_3D
      description: 3D detection topic being subscribed to

  - arg:
      name: tracking_tracks_topic
      default: /perception/detections_3D_tracked
      description: Topic to publish tracks to

  - arg:
      name: cameras_config_file
      default: "$(find-pkg-share sensor_interfacing)/config/hikrobot_camera_config.yaml"
      description: "Hikrobot cameras configuration file"

  - arg:
      name: detection_config_file
      default: "$(find-pkg-share deep_object_detection)/config/generic_model_params.yaml"
      description: "Path to YAML config for object detection"

  - arg:
      name: sync_config_file
      default: "$(find-pkg-share camera_sync)/config/multi_camera_sync_params.yaml"
      description: "Path to YAML config for multi-camera sync"

  - arg:
      name: input_topic
      default: "/multi_camera_sync/multi_image_raw"
      description: "Input MultiImage topic for detection (raw; sync uses use_compressed: false)"

  - arg:
      name: output_detections_topic
      default: "/detections"
      description: "Output detections topic"

  - arg:
      name: output_annotations_topic
      default: "/image_annotations"
      description: "Output image annotations topic"

  # Patchwork++ ground segmentation
  - node:
      pkg: patchworkpp
      exec: patchworkpp_node
      name: patchworkpp_node
      namespace: "perception"
      output: screen
      param:
        - from: $(var config_file)
      remap:
        - from: input_cloud
          to: /carla/top_lidar/points
        - from: ground_cloud
          to: /perception/ground_cloud
        - from: non_ground_cloud
          to: /perception/non_ground_cloud

  # 3D tracking component
  - node_container:
      pkg: rclcpp_components
      exec: component_container
      name: component_container
      namespace: "perception"
      output: screen

      composable_node:
        - pkg: tracking
          plugin: TrackingNode
          name: tracking_node
          namespace: "perception"
          param:
            - from: $(var config_file)
          remap:
            - from: input_detections
              to: $(var tracking_detections_topic)
            - from: output_tracks
              to: $(var tracking_tracks_topic)

  # ===========================================================================
  # Single component container for cameras, sync, and detection (zero-copy IPC)
  # ===========================================================================
  - node_container:
      pkg: rclcpp_components
      exec: component_container_mt
      name: perception_container
      namespace: ""

  # Load all 12 camera pipelines into the shared container
  - include:
      file: "$(find-pkg-share sensor_interfacing)/launch/all_cameras_composed.yaml"
      arg:
        - name: "container_name"
          value: "perception_container"
        - name: "cameras_config_file"
          value: "$(var cameras_config_file)"

  # Load multi-camera sync into the shared container
  - load_composable_node:
      target: perception_container
      composable_node:
        - pkg: camera_sync
          plugin: camera_sync::MultiCameraSyncNode
          name: multi_camera_sync
          namespace: ""
          extra_arg:
            - name: use_intra_process_comms
              value: "true"
          param:
            - from: "$(var sync_config_file)"

  # Load deep object detection into the shared container
  - load_composable_node:
      target: perception_container
      composable_node:
        - pkg: deep_object_detection
          plugin: deep_object_detection::DeepObjectDetectionNode
          name: deep_object_detection_node
          namespace: ""
          extra_arg:
            - name: use_intra_process_comms
              value: "true"
          remap:
            - from: "/multi_camera_sync/multi_image_compressed"
              to: "$(var input_topic)"
            - from: "/multi_camera_sync/multi_image_raw"
              to: "$(var input_topic)"
            - from: "/detections"
              to: "$(var output_detections_topic)"
            - from: "/image_annotations"
              to: "$(var output_annotations_topic)"
          param:
            - from: "$(var detection_config_file)"
            - name: model_path
              value: "models/yolov8m.onnx"
            - name: class_names_path
              value: "$(find-pkg-share deep_object_detection)/config/coco_classes.txt"
            - name: use_compressed_images
              value: false

  # Load 3D tracking into the shared container
  - load_composable_node:
      target: perception_container
      composable_node:
        - pkg: tracking
          plugin: TrackingNode
          name: tracking_node
          namespace: "perception"
          param:
            - from: $(var config_file)
          remap:
            - from: input_detections
              to: $(var tracking_detections_topic)
            - from: output_tracks
              to: $(var tracking_tracks_topic)

  # Lifecycle Manager for detection node
  - node:
      pkg: wato_lifecycle_manager
      exec: wato_lifecycle_manager_node
      name: detection_lifecycle_manager
      output: screen
      param:
        - name: node_names
          value: ["deep_object_detection_node"]
        - name: autostart
          value: $(var autostart)
        - name: transition_timeout_s
          value: 10.0
        - name: bond_timeout_s
          value: 0.0
        - name: bond_enabled
          value: $(var bond_enabled)

  # Lifecycle Manager for patchworkpp
  - node:
      pkg: wato_lifecycle_manager
      exec: wato_lifecycle_manager_node
      name: perception_lifecycle_manager
      namespace: "perception"
      output: screen
      param:
        - name: node_names
          value:
            - /perception/patchworkpp_node
            - /perception/tracking_node
        - name: autostart
          value: $(var autostart)
        - name: transition_timeout_s
          value: 10.0
        - name: bond_timeout_s
          value: 4.0
        - name: bond_enabled
          value: $(var bond_enabled)
