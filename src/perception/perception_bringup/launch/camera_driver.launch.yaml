#
# Launches the camera drivers (12 camera pipelines: driver + debayer + rectify)
# into perception_container. Run this first, then load
# camera_detection.launch.yaml to add sync + detection into the same container
# (zero-copy IPC).

launch:
  - arg:
      name: cameras_config_file
      default: "$(find-pkg-share sensor_interfacing)/config/hikrobot_camera_config.yaml"
      description: "Hikrobot cameras configuration file"

  - node_container:
      pkg: rclcpp_components
      exec: component_container_mt
      name: perception_container
      namespace: ""

  - include:
      file: "$(find-pkg-share sensor_interfacing)/launch/all_cameras_composed.yaml"
      arg:
        - name: "container_name"
          value: "perception_container"
        - name: "cameras_config_file"
          value: "$(var cameras_config_file)"
