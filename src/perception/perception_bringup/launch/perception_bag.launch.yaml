#
# Bag recording launch. The cameras are NITROS nodes, so they run in the
# perception (Isaac ROS) container alongside the recorder for zero-copy
# intra-process image transfer. All other sensors (GPS, LiDAR, CAN, etc.) are
# launched separately by interfacing.launch.yaml and recorded over Zenoh per
# the selected recording profile.
---
launch:
  # Recording arguments
  - arg:
      name: "recording_profile"
      default: "all_sensors"
      description: "Recording profile (all_sensors, camera_only, lidar_only)"

  - arg:
      name: "bag_path"
      default: "/bags"
      description: "Output directory for bag files"

  - arg:
      name: "cameras_config_file"
      default: "$(find-pkg-share perception_bringup)/config/hikrobot_camera_config.yaml"
      description: "Hikrobot cameras configuration file"

  # Single component container for all cameras + bag recorder (intra-process)
  - node_container:
      pkg: rclcpp_components
      exec: component_container_mt
      name: cameras_and_recorder
      namespace: ""

  # Load all 12 cameras into the shared container
  - include:
      file: "$(find-pkg-share perception_bringup)/launch/all_cameras_composed.yaml"
      arg:
        - name: "container_name"
          value: "cameras_and_recorder"
        - name: "cameras_config_file"
          value: "$(var cameras_config_file)"

  # Bag recorder (intra-process with cameras, inter-process with other sensors via Zenoh)
  - load_composable_node:
      target: cameras_and_recorder
      composable_node:
        - pkg: rosbag2_transport
          plugin: rosbag2_transport::Recorder
          name: bag_recorder
          extra_arg:
            - name: use_intra_process_comms
              value: "true"
          param:
            - from: "$(find-pkg-share perception_bringup)/config/bag_recorder/$(var recording_profile).yaml"
            - name: storage.uri
              value: "$(var bag_path)"
