#
# Loads multi-camera sync and deep object detection into perception_container.
# Requires camera_driver.launch.yaml to be launched first (creates the container
# and camera driver nodes). Load this file into the same component container for
# zero-copy IPC.

#
# Usage:
#   1. ros2 launch perception_bringup camera_driver.launch.yaml
#   2. ros2 launch perception_bringup camera_detection.launch.yaml
launch:
  - arg:
      name: detection_config_file
      default: "$(find-pkg-share perception_bringup)/config/perception_sim.yaml"
      description: "Path to YAML config for object detection"

  - arg:
      name: sync_config_file
      default: "$(find-pkg-share perception_bringup)/config/perception_sim.yaml"
      description: "Path to YAML config for multi-camera sync"

  - arg:
      name: input_topic
      default: "/multi_camera_sync/multi_image"
      description: "Input MultiImage topic for detection (general)"

  - arg:
      name: output_detections_topic
      default: "/detections"
      description: "Output detections topic"

  - arg:
      name: output_annotations_topic
      default: "/image_annotations"
      description: "Output image annotations topic"

  # Load sync into perception_container (created by camera_driver.launch.yaml)
  - load_composable_node:
      target: perception_container
      composable_node:
        - pkg: camera_sync
          plugin: camera_sync::MultiCameraSyncNode
          name: multi_camera_sync
          namespace: ""
          extra_arg:
            - name: use_intra_process_comms
              value: "true"
          remap:
            - from: "/multi_camera_sync/multi_image_compressed"
              to: "$(var input_topic)"
            - from: "/multi_camera_sync/multi_image_raw"
              to: "$(var input_topic)"
          param:
            - from: "$(var sync_config_file)"

  # Load deep object detection into the same container
  - load_composable_node:
      target: perception_container
      composable_node:
        - pkg: deep_object_detection
          plugin: deep_object_detection::DeepObjectDetectionNode
          name: deep_object_detection_node
          namespace: ""
          extra_arg:
            - name: use_intra_process_comms
              value: "true"
          remap:
            - from: "/multi_camera_sync/multi_image_compressed"
              to: "$(var input_topic)"
            - from: "/multi_camera_sync/multi_image_raw"
              to: "$(var input_topic)"
            - from: "/detections"
              to: "$(var output_detections_topic)"
            - from: "/image_annotations"
              to: "$(var output_annotations_topic)"
          param:
            - from: "$(var detection_config_file)"
            - name: model_path
              value: "/ws/models/yolov8m.onnx"
            - name: class_names_path
              value: "$(find-pkg-share deep_object_detection)/config/coco_classes.txt"
          

  # Lifecycle Manager for detection node
  - node:
      pkg: "nav2_lifecycle_manager"
      exec: "lifecycle_manager"
      name: "detection_lifecycle_manager"
      output: "screen"
      param:
        - name: "node_names"
          value: ["deep_object_detection_node"]
        - name: "autostart"
          value: true
        - name: "bond_timeout"
          value: 0.0
