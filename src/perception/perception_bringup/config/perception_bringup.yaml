# =============================================================================
# Patchwork++ Node
# =============================================================================
/**/patchworkpp_node:
  ros__parameters:
    # Patchwork++ parameters (seeded from library defaults)
    base_frame: "base_footprint"
    num_iter: 5
    num_lpr: 20
    num_min_pts: 0
    th_seeds: 0.3
    th_dist: 0.15
    th_seeds_v: 0.25
    th_dist_v: 0.85
    max_range: 90.0
    min_range: 1.0
    uprightness_thr: 0.101
    enable_RNR: false
    verbose: false

    # QoS Configuration
    # Subscriber QoS: best_effort for low-latency sensor data (default for LiDAR)
    qos_subscriber_reliability: "best_effort"  # Options: "reliable", "best_effort"
    qos_subscriber_depth: 10                   # Queue depth for incoming messages

    # Publisher QoS: reliable + transient_local for immediate availability
    # Transient local ensures late-joining subscribers (e.g., RViz) receive the latest
    # segmentation immediately without waiting for the next scan
    qos_publisher_reliability: "reliable"      # Options: "reliable", "best_effort"
    qos_publisher_durability: "transient_local"  # Options: "transient_local", "volatile"
    qos_publisher_depth: 10                    # Queue depth for outgoing messages

# =============================================================================
# Multi-Camera Synchronization Node
# =============================================================================
multi_camera_sync:
  ros__parameters:
    # For raw images, use topics like: ["/camera1/image_raw", "/camera2/image_raw"]
    # For compressed images, use topics like: ["/camera1/image_raw/compressed", "/camera2/image_raw/compressed"]
    camera_topics:
      - "/camera_pano_nn/image_rect_compressed"
      - "/camera_pano_ne/image_rect_compressed"
      - "/camera_pano_ee/image_rect_compressed"
      - "/camera_pano_se/image_rect_compressed"
      - "/camera_pano_ss/image_rect_compressed"
      - "/camera_pano_sw/image_rect_compressed"
      - "/camera_pano_ww/image_rect_compressed"
      - "/camera_pano_nw/image_rect_compressed"

    # CameraInfo topics (one per camera, same order). Required for batched ~/multi_camera_info.
    camera_info_topics:
      - "/camera_pano_nn/camera_info"
      - "/camera_pano_ne/camera_info"
      - "/camera_pano_ee/camera_info"
      - "/camera_pano_se/camera_info"
      - "/camera_pano_ss/camera_info"
      - "/camera_pano_sw/camera_info"
      - "/camera_pano_ww/camera_info"
      - "/camera_pano_nw/camera_info"

    # Optional names for the cameras (if not provided, will auto-generate camera_1, camera_2, etc.)
    camera_names:
      - "camera_pano_nn"
      - "camera_pano_ne"
      - "camera_pano_ee"
      - "camera_pano_se"
      - "camera_pano_ss"
      - "camera_pano_sw"
      - "camera_pano_ww"
      - "camera_pano_nw"

    # Whether to use compressed images (sensor_msgs/CompressedImage) instead of raw (sensor_msgs/Image)
    # Set to true if your camera topics publish compressed images
    use_compressed: true

    # Maximum time difference in milliseconds for message synchronization
    # Larger values allow more tolerance but may reduce temporal accuracy
    sync_tolerance_ms: 500.0

    # Queue size for message filters
    # Larger values can handle more variable frame rates but use more memory
    queue_size: 10

    # Whether to publish synchronization information and statistics
    publish_sync_info: true

    # IPC-specific optimizations
    use_intra_process_comms: true

    # QoS settings optimized for camera data with IPC
    qos_depth: 5
    qos_reliability: "best_effort"  # reliable or "best_effort" for higher throughput
    qos_durability: "volatile"
    qos_history: "keep_last"

# =============================================================================
# Deep Object Detection Node
# =============================================================================
/**/deep_object_detection_node:
  ros__parameters:
    model_path: "/ws/models/yolov8m.onnx"
    class_names_path: "/ws/install/deep_object_detection/share/deep_object_detection/config/coco_classes.txt"
    use_compressed_images: true  # Set to true for compressed images, false for uncompressed (shared memory)

    Model:
      num_classes: 80
      bbox_format: "cxcywh"
      output_shape: [1, 84, 8400]

    Preprocessing:
      input_width: 640
      input_height: 640
      normalization_type: "scale_0_1"
      mean: [0.0, 0.0, 0.0]
      std: [1.0, 1.0, 1.0]
      resize_method: "letterbox"
      pad_value: 114
      color_format: "rgb"

    Postprocessing:
      score_threshold: 0.65
      nms_iou_threshold: 0.45
      score_activation: "sigmoid"
      enable_nms: true
      class_score_mode: "all_classes"
      class_score_start_idx: -1
      class_score_count: -1

      layout:
        batch_dim: 0
        detection_dim: 2
        feature_dim: 1
        bbox_start_idx: 0
        bbox_count: 4
        score_idx: 4
        class_idx: 5

    Backend:
      plugin: "onnxruntime_gpu"
      execution_provider: "tensorrt"
      device_id: 0
      trt_engine_cache_enable: true
      trt_engine_cache_path: "/tmp/deep_ros_ort_trt_cache"

# =============================================================================
# Tracking Node
# =============================================================================
/**/tracking_node:
  ros__parameters:
    frame_rate: 12
    track_buffer: 120
    track_thresh: 0.1
    high_thresh: 0.15
    match_thresh: 0.9
    use_maj_cls: true
    # Use lidar_cc when running perception without localization (no map→lidar_cc TF).
    # Set to "map" when running with localization so tracks are in the global frame.
    output_frame: "lidar_cc"
    publish_visualization: true

# =============================================================================
# Spatial Association Node
# =============================================================================
/**/spatial_association_node:
  ros__parameters:
    lidar_frame: lidar_cc
    euclid_params:
      cluster_tolerance: 0.4
      min_cluster_size: 30
      max_cluster_size: 1200
      use_adaptive_clustering: true
      close_threshold: 10.0
      close_tolerance_mult: 1.5
    density_filter_params:
      density_weight: 0.6
      size_weight: 0.8
      distance_weight: 0.4
      score_threshold: 0.40
    merge_threshold: 0.55
    object_detection_confidence: 0.45   # Accept slightly weaker 2D detections
    voxel_size: 0.1
    quality_filter_params:
      max_distance: 80.0
      min_points: 3
      min_height: 0.08
      min_points_default: 5
      min_points_far: 4
      min_points_medium: 6
      min_points_large: 15
      distance_threshold_far: 30.0
      distance_threshold_medium: 20.0
      volume_threshold_large: 8.0
      min_density: 2.0
      max_density: 1000.0
      max_dimension: 15.0
      max_aspect_ratio: 15.0
    # Batched 2D detections are stamped with the image sync time; the voxel cloud uses the last *completed*
    # worker job stamp and often lags by >1 s. A positive threshold here skips every camera and produces
    # no 3D output despite valid TF and clusters. Use 0 to disable (recommended for this pipeline).
    max_detection_cloud_stamp_delta: 0.0
    publish_visualization: false  # Disable for production; enable for debugging
    debug_logging: false

    # Projection/utils: association, orientation, merge (see projection_utils.cpp). Filtering: quality_filter_params.
    projection_utils_params:
      marker_lifetime_s: 0.5
      marker_alpha: 0.2
      min_iou_threshold: 0.08   # Lower = more permissive association (was 0.15)
      min_camera_z_distance: 0.6
      # Strict gates (inner box, in-box point fraction, aspect) need accurate projection; disable for bringup
      # until camera–lidar calibration is verified, otherwise 3D output can be empty despite 2D detections.
      association_strict_matching: false
      association_allow_aabb_centroid_fallback: true
      ar_front_view_threshold: 1.2
      # Orientation search (coarse/fine derived from step)
      min_points_for_fit: 3
      default_sample_point_count: 64
      orientation_search_step_degrees: 2.0
      # Outlier rejection for small clusters
      outlier_rejection_point_count: 30
      outlier_sigma_multiplier: 4.5

# =============================================================================
# Lifecycle Managers
# =============================================================================
detection_lifecycle_manager:
  ros__parameters:
    node_names: ["deep_object_detection_node"]
    autostart: true
    transition_timeout_s: 10.0
    bond_timeout_s: 4.0
    bond_enabled: false

perception_lifecycle_manager:
  ros__parameters:
    node_names: ["/perception/patchworkpp_node", "/spatial_association_node", "/perception/tracking_node"]
    autostart: true
    autostart_delay_s: 15.0
    transition_timeout_s: 15.0
    bond_timeout_s: 4.0
    bond_enabled: false
