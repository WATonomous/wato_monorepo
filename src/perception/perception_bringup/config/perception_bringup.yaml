# =============================================================================
# Patchwork++ Node
# =============================================================================
/**/patchworkpp_node:
  ros__parameters:
    # Patchwork++ parameters (seeded from library defaults)
    base_frame: "base_footprint"
    num_iter: 5
    num_lpr: 20
    num_min_pts: 0
    th_seeds: 0.3
    th_dist: 0.15
    th_seeds_v: 0.25
    th_dist_v: 0.85
    max_range: 90.0
    min_range: 1.0
    uprightness_thr: 0.101
    enable_RNR: false
    verbose: false

    # QoS Configuration
    # Subscriber QoS: best_effort for low-latency sensor data (default for LiDAR)
    qos_subscriber_reliability: "best_effort"  # Options: "reliable", "best_effort"
    qos_subscriber_depth: 10                   # Queue depth for incoming messages

    # Publisher QoS: reliable + transient_local for immediate availability
    # Transient local ensures late-joining subscribers (e.g., RViz) receive the latest
    # segmentation immediately without waiting for the next scan
    qos_publisher_reliability: "reliable"      # Options: "reliable", "best_effort"
    qos_publisher_durability: "transient_local"  # Options: "transient_local", "volatile"
    qos_publisher_depth: 10                    # Queue depth for outgoing messages

# =============================================================================
# Multi-Camera Synchronization Node
# =============================================================================
multi_camera_sync:
  ros__parameters:
    # Camera topics to synchronize
    # For raw images, use topics like: ["/camera1/image_raw", "/camera2/image_raw"]
    # For compressed images, use topics like: ["/camera1/image_raw/compressed", "/camera2/image_raw/compressed"]
    camera_topics:
      - "/CAM_FRONT/image_rect_compressed"
      - "/CAM_FRONT_LEFT/image_rect_compressed"

    # CameraInfo topics (one per camera, same order). Required for batched ~/multi_camera_info.
    camera_info_topics:
      - "/CAM_FRONT/camera_info"
      - "/CAM_FRONT_LEFT/camera_info"

    # Optional names for the cameras (if not provided, will auto-generate camera_1, camera_2, etc.)
    camera_names:
      - "CAM_FRONT"
      - "CAM_FRONT_LEFT"

    # Whether to use compressed images (sensor_msgs/CompressedImage) instead of raw (sensor_msgs/Image)
    # Set to true if your camera topics publish compressed images
    use_compressed: true

    # Maximum time difference in milliseconds for message synchronization
    # Larger values allow more tolerance but may reduce temporal accuracy
    sync_tolerance_ms: 200.0

    # Queue size for message filters
    # Larger values can handle more variable frame rates but use more memory
    queue_size: 20

    # Whether to publish synchronization information and statistics
    publish_sync_info: true

    # IPC-specific optimizations
    use_intra_process_comms: true

    # QoS settings optimized for camera data with IPC
    qos_depth: 5
    qos_reliability: "best_effort"  # reliable or "best_effort" for higher throughput
    qos_durability: "volatile"
    qos_history: "keep_last"

# =============================================================================
# Deep Object Detection Node
# =============================================================================
/**/deep_object_detection_node:
  ros__parameters:
    model_path: "/ws/models/yolov8m.onnx"
    class_names_path: "/ws/install/deep_object_detection/share/deep_object_detection/config/coco_classes.txt"
    use_compressed_images: true  # Set to true for compressed images, false for uncompressed (shared memory)

    Model:
      num_classes: 80
      bbox_format: "cxcywh"
      output_shape: [1, 84, 8400]

    Preprocessing:
      input_width: 640
      input_height: 640
      normalization_type: "scale_0_1"
      mean: [0.0, 0.0, 0.0]
      std: [1.0, 1.0, 1.0]
      resize_method: "letterbox"
      pad_value: 114
      color_format: "rgb"

    Postprocessing:
      score_threshold: 0.65
      nms_iou_threshold: 0.45
      score_activation: "sigmoid"
      enable_nms: true
      class_score_mode: "all_classes"
      class_score_start_idx: -1
      class_score_count: -1

      layout:
        batch_dim: 0
        detection_dim: 2
        feature_dim: 1
        bbox_start_idx: 0
        bbox_count: 4
        score_idx: 4
        class_idx: 5

    Backend:
      plugin: "onnxruntime_cpu"
      execution_provider: "cpu"
      device_id: 0
      trt_engine_cache_enable: true
      trt_engine_cache_path: "/tmp/deep_ros_ort_trt_cache"

# =============================================================================
# Tracking Node
# =============================================================================
/**/tracking_node:
  ros__parameters:
    frame_rate: 2
    track_buffer: 30
    track_thresh: 0.5
    high_thresh: 0.6
    match_thresh: 1.0
    use_maj_cls: true
    output_frame: "map"

# =============================================================================
# Attribute Assigner Node
# =============================================================================
/**/attribute_assigner_node:
  ros__parameters:
    # Class ID mappings (COCO dataset: traffic_light=9, car=2, truck=7, bus=5)
    traffic_light_class_ids: ["traffic_light", "9"]
    car_class_ids: ["car", "2", "truck", "7", "bus", "5"]
    min_detection_confidence: 0.3

    # Traffic light color detection thresholds (HSV-based)
    traffic_light_min_saturation: 60.0
    traffic_light_min_value: 80.0

    # Car signal detection thresholds (HSV-based)
    car_brake_min_brightness: 90.0
    car_amber_hue_lo: 12.0
    car_amber_hue_hi: 35.0
    car_amber_min_saturation: 80.0
    car_amber_min_value: 100.0

    # QoS Configuration for subscribers
    qos_subscriber_reliability: "best_effort"  # Options: "reliable", "best_effort"
    qos_subscriber_depth: 10

    # QoS Configuration for publishers
    qos_publisher_reliability: "reliable"      # Options: "reliable", "best_effort"
    qos_publisher_durability: "transient_local"  # Options: "transient_local", "volatile"
    qos_publisher_depth: 10

    # Message synchronization
    sync_queue_size: 10

# =============================================================================
# Lifecycle Managers
# =============================================================================
detection_lifecycle_manager:
  ros__parameters:
    node_names: ["deep_object_detection_node", "attribute_assigner_node"]
    autostart: true
    transition_timeout_s: 10.0
    bond_timeout_s: 4.0
    bond_enabled: false

perception_lifecycle_manager:
  ros__parameters:
    node_names: ["/perception/patchworkpp_node", "/perception/tracking_node"]
    autostart: true
    transition_timeout_s: 10.0
    bond_timeout_s: 4.0
    bond_enabled: false
