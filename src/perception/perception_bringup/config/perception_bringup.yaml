# =============================================================================
# Perception Bringup Config Layout
# =============================================================================
# For each node, parameters are grouped by function:
# - Inputs / frames / topics
# - Core algorithm behavior
# - Thresholds and scoring
# - Performance / QoS
# - Output and debug toggles

# =============================================================================
# Patchwork++ Node (Ground Segmentation)
# =============================================================================
/**/patchworkpp_node:
  ros__parameters:
    # --- Frames and range gates ---
    base_frame: "base_footprint"
    min_range: 1.0
    max_range: 90.0

    # --- Core Patchwork++ algorithm knobs ---
    num_iter: 5
    num_lpr: 20
    num_min_pts: 0
    th_seeds: 0.3
    th_dist: 0.15
    th_seeds_v: 0.25
    th_dist_v: 0.85
    uprightness_thr: 0.101
    enable_RNR: false
    verbose: false

    # --- Subscriber QoS (incoming LiDAR) ---
    qos_subscriber_reliability: "best_effort"  # Options: "reliable", "best_effort"
    qos_subscriber_depth: 10

    # --- Publisher QoS (segmented clouds) ---
    # Transient local helps late subscribers (for example RViz) get the latest output immediately.
    qos_publisher_reliability: "reliable"      # Options: "reliable", "best_effort"
    qos_publisher_durability: "transient_local"  # Options: "transient_local", "volatile"
    qos_publisher_depth: 10

# =============================================================================
# Multi-Camera Synchronization Node
# =============================================================================
multi_camera_sync:
  ros__parameters:
    # --- Camera stream selection (keep list order aligned across all 3 lists) ---
    # Raw topics example: ["/camera1/image_raw", "/camera2/image_raw"]
    # Compressed topics example: ["/camera1/image_raw/compressed", "/camera2/image_raw/compressed"]
    camera_topics:
      # - "/camera_pano_ne/image_rect_compressed"
      - "/camera_pano_ee/image_rect_compressed"
      # - "/camera_pano_se/image_rect_compressed"
      # - "/camera_pano_ss/image_rect_compressed"
      # - "/camera_pano_sw/image_rect_compressed"
      - "/camera_pano_ww/image_rect_compressed"
      # - "/camera_pano_nw/image_rect_compressed"
      - "/camera_pano_nn/image_rect_compressed"

    # CameraInfo topics (same order as camera_topics). Required for ~/multi_camera_info.
    camera_info_topics:
      # - "/camera_pano_ne/camera_info"
      - "/camera_pano_ee/camera_info"
      # - "/camera_pano_se/camera_info"
      # - "/camera_pano_ss/camera_info"
      # - "/camera_pano_sw/camera_info"
      - "/camera_pano_ww/camera_info"
      # - "/camera_pano_nw/camera_info"
      - "/camera_pano_nn/camera_info"

    # Optional camera names (same order). Auto-generated if omitted.
    camera_names:
      # - "camera_pano_ne"
      - "camera_pano_ee"
      # - "camera_pano_se"
      # - "camera_pano_ss"
      # - "camera_pano_sw"
      - "camera_pano_ww"
      # - "camera_pano_nw"
      - "camera_pano_nn"

    # --- Transport and synchronization behavior ---
    use_compressed: true   # true: sensor_msgs/CompressedImage, false: sensor_msgs/Image
    sync_tolerance_ms: 500.0
    queue_size: 10
    publish_sync_info: true

    # --- Performance and QoS ---
    use_intra_process_comms: true
    qos_depth: 5
    qos_reliability: "best_effort"  # reliable or "best_effort" for higher throughput
    qos_durability: "volatile"
    qos_history: "keep_last"

# =============================================================================
# Deep Object Detection Node
# =============================================================================
/**/deep_object_detection_node:
  ros__parameters:
    # --- Input/asset paths and transport ---
    model_path: "/ws/models/yolov8m.onnx"
    class_names_path: "/ws/install/deep_object_detection/share/deep_object_detection/config/coco_classes.txt"
    use_compressed_images: true  # true for compressed image topics, false for uncompressed/shared memory

    # --- Model tensor contract ---
    Model:
      num_classes: 80
      bbox_format: "cxcywh"
      output_shape: [1, 84, 8400]

    # --- Preprocessing ---
    Preprocessing:
      input_width: 640
      input_height: 640
      normalization_type: "scale_0_1"
      mean: [0.0, 0.0, 0.0]
      std: [1.0, 1.0, 1.0]
      resize_method: "letterbox"
      pad_value: 114
      color_format: "rgb"

    # --- Postprocessing (confidence, NMS, output layout) ---
    Postprocessing:
      score_threshold: 0.65
      nms_iou_threshold: 0.45
      score_activation: "sigmoid"
      enable_nms: true
      class_score_mode: "all_classes"
      class_score_start_idx: -1
      class_score_count: -1

      layout:
        batch_dim: 0
        detection_dim: 2
        feature_dim: 1
        bbox_start_idx: 0
        bbox_count: 4
        score_idx: 4
        class_idx: 5

    # --- Runtime backend ---
    Backend:
      plugin: "onnxruntime_gpu"
      execution_provider: "tensorrt"
      device_id: 0
      trt_engine_cache_enable: true
      trt_engine_cache_path: "/tmp/deep_ros_ort_trt_cache"

# =============================================================================
# Tracking Node
# =============================================================================
/**/tracking_node:
  ros__parameters:
    # --- Temporal tracking behavior ---
    frame_rate: 12
    track_buffer: 120
    track_thresh: 0.1
    high_thresh: 0.15
    match_thresh: 0.9
    use_maj_cls: true
    # Use lidar_cc when running perception without localization (no map→lidar_cc TF).
    # Set to "map" when running with localization so tracks are in the global frame.
    output_frame: "lidar_cc"
    publish_visualization: true

    # --- Prediction (Kalman filter future path) ---
    centroid_history_size: 10   # past centroids stored per track
    prediction_time: 5.0        # how far into the future to predict (seconds)
    prediction_dt: 0.1          # time step between predicted poses (seconds)
    process_noise: 0.1          # KF process noise (higher = trust measurements more)
    measurement_noise: 0.5      # KF measurement noise (higher = smoother, filters outliers more)

# =============================================================================
# Spatial Association Node
# =============================================================================
/**/spatial_association_node:
  ros__parameters:
    # This block mirrors spatial_association/config/params.yaml so every node parameter
    # can be tuned directly from perception bringup.

    # --- Time alignment, frame selection, and cache behavior ---
    lidar_frame: lidar_cc
    max_detection_cloud_stamp_delta: 0.0
    detection_stamp_fallback_policy: "median_camera_stamp"
    clustered_cloud_cache_size: 24
    raw_cloud_pending_queue_size: 1
    raw_cloud_latest_only: true
    bbox_markers_use_detection_stamp: false
    skip_repeat_association_publish: true

    # --- Euclidean clustering (3D proposals from point cloud) ---
    euclid_params:
      cluster_tolerance: 0.40
      min_cluster_size: 10
      max_cluster_size: 600
      use_adaptive_clustering: true
      close_threshold: 5.0
      close_tolerance_mult: 1.0

      # Distance-band overrides for adaptive clustering.
      clustering_bands:
        max_distances: [8.0, 20.0, 40.0, 999.0]
        tolerance_mults: [1.0, 1.0, 1.5, 2.5]
        min_cluster_sizes: [10, 6, 3, 2]

    # --- Merge behavior ---
    merge_threshold: 0.15

    # --- Cross-camera deduplication ---
    cross_camera_dedup:
      enabled: true
      min_lidar_index_overlap: 0.35
      weak_lidar_index_overlap: 0.15
      max_center_dist_m: 1.2
      min_bev_box_iou: 0.10
      min_bev_box_iou_no_class: 0.20

    # --- Global detection gates ---
    object_detection_confidence: 0.2
    voxel_size: 0.10

    # --- Quality filtering of 3D boxes ---
    quality_filter_params:
      max_distance: 60.0
      min_points: 1
      min_height: 0.05
      min_points_default: 3
      min_points_far: 1
      min_points_medium: 2
      min_points_large: 15
      distance_threshold_far: 45.0
      distance_threshold_medium: 30.0
      volume_threshold_large: 8.0
      min_density: 1.5
      max_dimension: 15.0
      max_aspect_ratio: 15.0

    # --- Node outputs and debug toggles ---
    publish_bounding_box: true
    publish_visualization: true
    publish_image_visualization: false
    debug_logging: false

    # Projection/utils: association, orientation, merge (see projection_utils.cpp).
    projection_utils_params:
      # --- Marker output ---
      marker_lifetime_s: 0.5
      marker_alpha: 0.2

      # --- Base association scoring ---
      min_iou_threshold: 0.08  # Lower = more permissive association (was 0.15)
      min_camera_z_distance: 0.4
      detection_score_weight: 0.5
      iou_score_weight: 0.4

      # --- Orientation and shape fitting ---
      ar_front_view_threshold: 1.2
      min_points_for_fit: 3
      default_sample_point_count: 128
      orientation_search_step_degrees: 1.0
      orientation_coarse_step_multiplier: 3.0
      orientation_fine_range_multiplier: 4.0
      use_l_shaped_fitting: true
      l_shape_energy_variance_weight: 0.7

      # --- Outlier rejection and robust extents ---
      outlier_rejection_point_count: 20
      outlier_sigma_multiplier: 3.0
      xy_extent_percentile_low: 10.0
      xy_extent_percentile_high: 90.0
      z_extent_percentile_low: 8.0
      z_extent_percentile_high: 92.0

      # --- Camera image geometry ---
      image_width: 1280
      image_height: 1024

      # Strict gates (inner box, in-box fraction, aspect) need accurate projection.
      # Keep disabled during bringup until camera-lidar calibration is verified.
      association_strict_matching: false
      association_centroid_inner_box_fraction: 0.95
      association_min_inside_point_fraction: 0.10
      association_min_ar_consistency_score: 0.05
      association_use_point_projection_rect_for_iou: true

      # --- Class-aware threshold scaling ---
      person_inside_fraction_scale: 0.15
      vehicle_inside_fraction_scale: 0.50
      person_iou_threshold_scale: 0.03
      vehicle_iou_threshold_scale: 0.10
      person_ar_consistency_scale: 0.20

      # --- Minimum evidence gates ---
      association_min_inside_points: 1
      min_size_consistency_score: 0.05
      min_det_area_far_px2: 60.0

      # --- Association score blending ---
      association_weight_iou: 0.30
      association_weight_inside_fraction: 0.28
      association_weight_ar: 0.18
      association_weight_centroid: 0.14
      association_weight_points: 0.10
      centroid_score_detection_scale: 0.35
      point_score_saturation_count: 120.0
      association_centroid_distance_multiplier: 1.5
      single_point_bbox_margin_px: 3.0

      # --- Assignment and distance-aware relaxations ---
      min_depth_for_enrichment: 0.1
      use_hungarian_assignment: true
      far_iou_threshold_scale: 0.2
      medium_iou_threshold_scale: 0.4
      far_inside_fraction_scale: 0.2
      medium_inside_fraction_scale: 0.4

      # --- Class-specific quality limits ---
      quality_person_max_height_m: 4.0
      quality_person_max_footprint_xy_m: 3.0
      quality_person_max_volume_m3: 8.0
      quality_vehicle_max_height_m: 4.8

      # --- Depth consistency scoring from enriched 3D detections ---
      depth_score_weight: 0.10
      depth_score_scale: 5.0

      # --- Class-aware size prior (pre-match penalty; toggle off to disable entirely) ---
      enable_size_prior: true
      size_prior_weight: 0.10
      size_prior_scale: 0.5
      size_prior_classes:      ["person", "car",  "truck", "bus",  "bicycle", "motorcycle"]
      size_prior_min_widths:   [0.1,      1.4,    2.0,     2.2,    0.3,       0.4]
      size_prior_max_widths:   [0.9,      2.2,    3.0,     3.0,    0.8,       1.0]
      size_prior_min_lengths:  [0.1,      2.5,    5.0,     8.0,    1.2,       1.5]
      size_prior_max_lengths:  [0.9,      4.0,    12.0,    15.0,   2.0,       2.5]
      size_prior_min_heights:  [0.4,      1.2,    2.0,     2.5,    0.8,       0.8]
      size_prior_max_heights:  [3.0,      2.0,    4.5,     4.0,    1.8,       1.8]

# =============================================================================
# Attribute Assigner Node
# =============================================================================
/**/attribute_assigner_node:
  ros__parameters:
    # --- Topic I/O ---
    # message_filters does not respect launch remapping; set concrete topic names here.
    input_multi_image_topic: "/multi_camera_sync/multi_image_compressed"
    input_detections_topic: "/perception/detections"
    output_detections_topic: "/perception/detections_enriched"

    # --- Class mapping and confidence gate ---
    traffic_light_class_ids: ["traffic light"]
    car_class_ids: ["car"]
    truck_class_ids: ["truck"]
    bus_class_ids: ["bus"]
    min_detection_confidence: 0.3

    # --- Traffic light color thresholds (HSV, OpenCV H: 0-180) ---
    traffic_light_min_saturation: 30.0
    traffic_light_min_value: 100.0
    traffic_light_red_hue_lo: 23.0      # Red: H <= this OR H >= red_hue_hi
    traffic_light_red_hue_hi: 160.0     # Red: H >= this OR H <= red_hue_lo
    traffic_light_yellow_hue_hi: 55.0   # Yellow: red_hue_lo < H <= this
    traffic_light_green_hue_hi: 85.0    # Green: yellow_hue_hi < H < this
    traffic_light_strip_margin: 0.25    # Fraction of width/height ignored at sides (0.0-0.45)

    # --- Vehicle signal thresholds (HSV) ---
    car_brake_min_brightness: 254.0
    car_brake_min_saturation: 110.0     # Lower than amber, helps with washed-out brake lights
    car_red_hue_lo: 23.0                # Brake-light red: H <= this
    car_red_hue_hi: 160.0               # Brake-light red: H >= this
    car_amber_hue_lo: 24.0
    car_amber_hue_hi: 35.0
    car_amber_min_saturation: 40.0
    car_amber_min_value: 200.0

    # --- Subscriber QoS ---
    qos_subscriber_reliability: "best_effort"  # Options: "reliable", "best_effort"
    qos_subscriber_depth: 5

    # --- Publisher QoS ---
    qos_publisher_reliability: "reliable"  # Options: "reliable", "best_effort"
    qos_publisher_durability: "volatile"      # Options: "transient_local", "volatile"
    qos_publisher_depth: 1

    # --- Message synchronization ---
    sync_queue_size: 5
    sync_max_time_diff_ms: 400.0  # Detections usually lag images by about 50-150 ms

    # --- Visualization outputs ---
    enable_image_markers: false  # 2D image marker overlays
    enable_3d_markers: true      # 3D MarkerArray for Foxglove

    # --- 3D enrichment (intrinsics + TF + priors) ---
    input_multi_camera_info_topic: "/multi_camera_sync/multi_camera_info"  # deep_msgs/MultiCameraInfo
    target_frame: "base_link"
    traffic_light_assumed_depth: 30.0
    car_assumed_depth: 20.0

    # --- Canonical vehicle dimensions (meters) ---
    car_real_width: 1.8
    car_real_height: 1.8
    car_real_length: 6.0

    truck_real_width: 2.5
    truck_real_height: 3.5
    truck_real_length: 8.0

    bus_real_width: 2.5
    bus_real_height: 3.2
    bus_real_length: 12.0

# =============================================================================
# Lifecycle Managers
# =============================================================================
detection_lifecycle_manager:
  ros__parameters:
    # Manages model inference and attribute enrichment nodes.
    node_names: ["deep_object_detection_node", "attribute_assigner_node"]
    autostart: true
    transition_timeout_s: 30.0
    bond_timeout_s: 4.0
    bond_enabled: false

perception_lifecycle_manager:
  ros__parameters:
    # Manages segmentation, association, and tracking pipeline nodes.
    node_names: ["/perception/patchworkpp_node", "/spatial_association_node", "/perception/tracking_node"]
    autostart: true
    autostart_delay_s: 3.0
    transition_timeout_s: 3.0
    bond_timeout_s: 4.0
    bond_enabled: false
