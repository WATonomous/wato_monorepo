# Example configuration for eidos_transform (dual-EKF architecture).
#
# Local EKF (odom frame): fuses odom_sources, broadcasts odom->base_link
# Global EKF (map frame): fuses odom_sources + map_sources, derives map->odom
/**/eidos_transform_node:
  ros__parameters:
    tick_rate: 200.0

    frames:
      odom: "odom"
      base_link: "base_footprint"
      map: "map"
      utm: "utm"

    topics:
      odom: "transform/odometry"
      utm_to_map: "gps_factor/utm_to_map_tf"
      predict_service: "transform/predict_relative"

    ekf:
      plugin: "eidos_transform::HolonomicEKF"
      name: "holonomic_ekf"

    # Local EKF process noise
    holonomic_ekf:
      process_noise:
        [1.0e-4, 1.0e-4, 1.0e-4, 1.0e-4, 1.0e-4, 1.0e-4,
         1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2]

    # Global EKF process noise
    holonomic_ekf_global:
      process_noise:
        [1.0e-4, 1.0e-4, 1.0e-4, 1.0e-4, 1.0e-4, 1.0e-4,
         1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2]

    # Odom sources (fed to BOTH local and global EKFs)
    odom_sources:
      - "liso_odom"
      - "imu"

    liso_odom:
      odom_topic: "liso/odometry_incremental"
      pose_mask: [true, true, true, true, true, true]
      twist_mask: [false, false, false, false, false, false]
      pose_noise: [1.0e-3, 1.0e-3, 1.0e-3, 1.0e-3, 1.0e-3, 1.0e-3]
      twist_noise: [1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2]

    imu:
      odom_topic: "imu_factor/odometry"
      pose_mask: [false, false, false, false, false, false]
      twist_mask: [true, true, true, false, false, false]
      pose_noise: [1.0e-4, 1.0e-4, 1.0e-4, 1.0e-4, 1.0e-4, 1.0e-4]
      twist_noise: [1.0e-4, 1.0e-4, 1.0e-4, 1.0e-4, 1.0e-4, 1.0e-4]

    # Map sources (fed to global EKF ONLY)
    map_sources:
      - "liso_map"
      - "slam"

    liso_map:
      odom_topic: "liso/odometry"
      pose_mask: [true, true, true, true, true, true]
      twist_mask: [false, false, false, false, false, false]
      pose_noise: [1.0e-3, 1.0e-3, 1.0e-3, 1.0e-3, 1.0e-3, 1.0e-3]
      twist_noise: [1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2]

    slam:
      odom_topic: "slam/odometry"
      pose_mask: [true, true, true, true, true, true]
      twist_mask: [false, false, false, false, false, false]
      pose_noise: [1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2]
      twist_noise: [1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2]
