# Example configuration for eidos_transform.
#
# This configuration fuses LISO odometry (pose + twist) and uses
# slam/pose as the map-frame source for map->odom correction.
/**/eidos_transform_node:
  ros__parameters:
    # ---- Tick rate (Hz) ----
    tick_rate: 200.0

    # ---- Frames ----
    frames:
      odom: "odom"
      base_link: "base_footprint"
      map: "map"
      utm: "utm"

    # ---- Topics ----
    topics:
      odom: "transform/odometry"
      map_source: "slam/pose"
      utm_to_map: ""
      predict_service: "transform/predict_relative"

    # ---- EKF model plugin ----
    ekf:
      plugin: "eidos_transform::HolonomicEKF"
      name: "holonomic_ekf"

    # ---- EKF process noise (12 values: 6 pose + 6 velocity) ----
    holonomic_ekf:
      process_noise:
        - 1.0e-4  # rx
        - 1.0e-4  # ry
        - 1.0e-4  # rz
        - 1.0e-4  # tx
        - 1.0e-4  # ty
        - 1.0e-4  # tz
        - 1.0e-2  # vel angular_x
        - 1.0e-2  # vel angular_y
        - 1.0e-2  # vel angular_z
        - 1.0e-2  # vel linear_x
        - 1.0e-2  # vel linear_y
        - 1.0e-2  # vel linear_z

    # ---- Odom sources ----
    odom_sources:
      - "liso"
      - "imu"

    liso:
      odom_topic: "liso/odometry_incremental"
      pose_mask: [true, true, true, true, true, true]
      twist_mask: [false, false, false, false, false, false]
      pose_noise: [1.0e-3, 1.0e-3, 1.0e-3, 1.0e-3, 1.0e-3, 1.0e-3]
      twist_noise: [1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2]

    imu:
      odom_topic: "imu_factor/odometry"
      pose_mask: [false, false, false, false, false, false]
      twist_mask: [true, true, true, false, false, false]   # angular velocity only (rx, ry, rz)
      pose_noise: [1.0e-4, 1.0e-4, 1.0e-4, 1.0e-4, 1.0e-4, 1.0e-4]
      twist_noise: [1.0e-4, 1.0e-4, 1.0e-4, 1.0e-4, 1.0e-4, 1.0e-4]
