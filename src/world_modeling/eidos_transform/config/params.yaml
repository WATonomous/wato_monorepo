# Example configuration for eidos_transform (dual-EKF architecture).
#
# Local EKF (odom frame): fuses odom_sources, broadcasts odom->base_link
# Global EKF (map frame): fuses map_sources, derives map->odom via TF lookup
#
# Each source has a `type` field: "odom" (nav_msgs/Odometry) or "imu" (sensor_msgs/Imu).
# A source can appear in odom_sources, map_sources, or both.
/**/eidos_transform_node:
  ros__parameters:
    tick_rate: 200.0

    frames:
      odom: "odom"
      base_link: "base_footprint"
      map: "map"
      utm: "utm"

    topics:
      odom: "transform/odometry"
      utm_to_map: "gps_factor/utm_to_map_tf"
      predict_service: "transform/predict_relative"

    ekf:
      plugin: "eidos_transform::HolonomicEKF"
      name: "holonomic_ekf"

    # Process noise: [pose(6), velocity(6), accel_bias(3)]
    holonomic_ekf:
      process_noise:
        [1.0e-4, 1.0e-4, 1.0e-4, 1.0e-4, 1.0e-4, 1.0e-4,
         1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2,
         1.0e-6, 1.0e-6, 1.0e-6]

    holonomic_ekf_global:
      process_noise:
        [1.0e-4, 1.0e-4, 1.0e-4, 1.0e-4, 1.0e-4, 1.0e-4,
         1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2,
         1.0e-6, 1.0e-6, 1.0e-6]

    # Odom sources (local EKF only, odom frame)
    odom_sources:
      - "liso_odom"
      - "imu_raw"

    liso_odom:
      type: "odom"
      topic: "liso/odometry_incremental"
      pose_mask: [true, true, true, true, true, true]
      twist_mask: [false, false, false, false, false, false]
      pose_noise: [1.0e-3, 1.0e-3, 1.0e-3, 1.0e-3, 1.0e-3, 1.0e-3]
      twist_noise: [1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2]

    imu_raw:
      type: "imu"
      topic: "/novatel/oem7/imu/data"
      imu_frame: "imu_link"
      use_orientation: true
      use_angular_velocity: true
      use_linear_acceleration: false
      gravity: 9.80511
      gravity_compensated: false
      orientation_noise: [1.0e-2, 1.0e-2, 1.0e-2, 1.0, 1.0, 1.0]
      angular_velocity_noise: [1.0e-4, 1.0e-4, 1.0e-4, 1.0, 1.0, 1.0]
      linear_velocity_noise: [1.0, 1.0, 1.0, 1.0e-1, 1.0e-1, 1.0e-1]

    # Map sources (global EKF only, map frame)
    map_sources:
      - "liso_map"
      - "slam"

    liso_map:
      type: "odom"
      topic: "liso/odometry"
      pose_mask: [true, true, true, true, true, true]
      twist_mask: [true, true, true, true, true, true]
      pose_noise: [1.0e-3, 1.0e-3, 1.0e-3, 1.0e-3, 1.0e-3, 1.0e-3]
      twist_noise: [1.0e-3, 1.0e-3, 1.0e-3, 1.0e-3, 1.0e-3, 1.0e-3]

    slam:
      type: "odom"
      topic: "slam/odometry"
      pose_mask: [true, true, true, true, true, true]
      twist_mask: [false, false, false, false, false, false]
      pose_noise: [1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2]
      twist_noise: [1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2]
