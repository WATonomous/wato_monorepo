---
/**:
  ros__parameters:
    use_sim_time: false

ekf_filter_node_local:
  ros__parameters:
    frequency: 50.0
    two_d_mode: false
    odom_frame: odom
    base_frame: base_footprint
    world_frame: odom
    publish_tf: true

    # Eidos IMU incremental odometry
    odom0: motion_model/odometry/imu_incremental
    odom0_config: [true,true,true, true,true,true, true,true,true, true,true,true, false,false,false]

ekf_filter_node_global:
  ros__parameters:
    frequency: 50.0
    two_d_mode: false
    odom_frame: odom
    base_frame: base_footprint
    world_frame: map
    publish_tf: true

    # Eidos IMU incremental odometry (continuous)
    odom0: motion_model/odometry/imu_incremental
    odom0_config: [true,true,true, true,true,true, true,true,true, true,true,true, false,false,false]

    # Eidos graph-optimized pose (absolute, in map frame)
    odom1: slam/odometry
    odom1_config: [true,true,true, true,true,true, false,false,false, false,false,false, false,false,false]
