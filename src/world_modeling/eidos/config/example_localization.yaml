/**/eidos_node:
  ros__parameters:
    # ---- Frames ----
    frames:
      base_link: "base_footprint"
      odometry: "odom"
      map: "map"

    # ---- TransformManager ----
    transforms:
      odom_source: "liso_factor"   # EKF fuses LISO odom + motion model for smooth odom→base
      map_source: ""               # map→odom is fixed from relocalization
      rate: 500.0
      fusion:
        process_noise: [1.0e-4, 1.0e-4, 1.0e-4, 1.0e-2, 1.0e-2, 1.0e-2]
        measurement_noise: [1.0e-6, 1.0e-6, 1.0e-6, 1.0e-4, 1.0e-4, 1.0e-4]

    # ---- Core ----
    slam_rate: 10.0
    relocalization_timeout: 30.0

    isam2:
      relinearize_threshold: 0.01
      relinearize_skip: 1

    prior:
      pose_cov: [1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2]

    map:
      load_path: "/opt/watonomous/maps/wrestrc.map"
      save_path: ""

    # ---- Core topics / services ----
    topics:
      pose: "slam/pose"
      status: "slam/status"
      odom: "slam/odometry"
      save_map_service: "slam/save_map"
      load_map_service: "slam/load_map"

    odom_pose_cov: [1.0e-3, 1.0e-3, 1.0e-3, 1.0e-4, 1.0e-4, 1.0e-4]

    # ---- Plugin lists ----
    factor_plugins:
      - "gps_factor"
      - "liso_factor"

    relocalization_plugins:
      - "gps_icp_relocalization"

    visualization_plugins:
      - "keyframe_map_visualization"

    # ==========================================================================
    # Motion Model (kinematic state transition model)
    # ==========================================================================
    motion_model:
      plugin: "eidos::HolonomicMotionModel"

    # ==========================================================================
    # GPS Factor (loads utm_to_map offset from prior map, no factors injected)
    # ==========================================================================
    gps_factor:
      plugin: "eidos::GpsFactor"
      add_factors: false

      gps_topic: "/novatel/oem7/fix"
      imu_topic: "/novatel/oem7/imu/data"

      max_cov: 5.0
      use_elevation: true
      min_radius: 200.0
      pose_cov_threshold: 1.0
      gps_cov: [2.0, 2.0, 4.0]

    # ==========================================================================
    # LISO Factor (scan-to-submap matching against prior map)
    # ==========================================================================
    liso_factor:
      plugin: "eidos::LisoFactor"
      add_factors: false
      submap_source: "prior_map"

      lidar_topic: "/lidar_cc/velodyne_points"
      odom_topic: "liso/odometry"
      odometry_incremental_topic: "liso/odometry_incremental"
      imu_topic: "/novatel/oem7/imu/data"

      lidar_frame: "lidar_cc"
      imu_frame: "imu_link"

      initialization:
        warmup_samples: 200
        stationary_gyr_threshold: 0.005

      scan_ds_resolution: 0.5
      submap_ds_resolution: 0.5
      num_neighbors: 10
      submap_radius: 30.0
      max_submap_states: 15

      max_correspondence_distance: 2.0
      max_iterations: 20
      num_threads: 16

      min_inliers: 50
      min_noise: 0.01
      min_scan_distance: 5.0

      odom_pose_cov: [0.01, 0.01, 0.005, 1.0e-6, 1.0e-6, 1.0e-3]
      odom_twist_cov: [1.0e-4, 1.0e-4, 1.0e-8, 1.0e-10, 1.0e-10, 1.0e-6]

    # ==========================================================================
    # GPS + ICP Relocalization
    # ==========================================================================
    gps_icp_relocalization:
      plugin: "eidos::GpsIcpRelocalization"

      gps_topic: "/novatel/oem7/fix"
      lidar_topic: "/lidar_cc/velodyne_points"
      imu_topic: "/novatel/oem7/imu/data"

      lidar_frame: "lidar_cc"
      imu_frame: "imu_link"

      gps_candidate_radius: 30.0
      pointcloud_from: "liso_factor/cloud"
      gps_from: "gps_factor"

      scan_ds_resolution: 0.5
      submap_leaf_size: 0.4
      max_correspondence_distance: 2.0
      max_icp_iterations: 100
      num_threads: 16
      num_neighbors: 10

      fitness_threshold: 0.3

    # ==========================================================================
    # Keyframe Map Visualization
    # ==========================================================================
    keyframe_map_visualization:
      plugin: "eidos::KeyframeMapVisualization"
      topic: "slam/visualization/map"
      pointcloud_from: "liso_factor/cloud"
      voxel_leaf_size: 0.4
      publish_rate: 1.0
      mode: "accumulate"

      accumulate:
        skip_factor: 20

      windowed:
        radius: 50.0
