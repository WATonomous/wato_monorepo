# Eidos SLAM only — for building maps from bag replay.
# Usage: ros2 launch world_modeling_bringup world_model_mapping.launch.yaml

launch:
  - arg:
      name: eidos_config_file
      default: $(find-pkg-share world_modeling_bringup)/config/eidos_v2_slam.yaml
      description: Path to the eidos SLAM configuration file

  - arg:
      name: config_file
      default: $(find-pkg-share world_modeling_bringup)/config/world_model_sim.yaml
      description: Path to the world_model configuration file

  - arg:
      name: use_sim_time
      default: "false"
      description: Use simulation time from /clock topic

  # Eidos SLAM Node
  - node:
      pkg: eidos_v2
      exec: eidos_node
      name: eidos_node
      namespace: "world_modeling"
      output: screen
      param:
        - from: $(var eidos_config_file)
        - name: use_sim_time
          value: $(var use_sim_time)

  # Costmap Node
  - node:
      pkg: costmap
      exec: costmap_node
      name: costmap_node
      namespace: "world_modeling"
      output: screen
      param:
        - from: $(var config_file)
      remap:
        - from: world_objects
          to: world_objects_enriched
        - from: costmap
          to: costmap
        - from: pointcloud
          to: /lidar_cc/velodyne_points
        - from: footprint
          to: costmap_footprint
        - from: spawn_wall
          to: spawn_wall
        - from: despawn_wall
          to: despawn_wall


  # Lifecycle Manager
  - node:
      pkg: wato_lifecycle_manager
      exec: wato_lifecycle_manager_node
      name: eidos_lifecycle_manager
      namespace: "world_modeling"
      output: screen
      param:
        - name: node_names
          value:
            - /world_modeling/eidos_node
            - /world_modeling/costmap_node
        - name: autostart
          value: true
        - name: transition_timeout_s
          value: 10.0
        - name: bond_timeout_s
          value: 4.0
        - name: bond_enabled
          value: false
