launch:
  - arg:
      name: eidos_config_file
      default: $(find-pkg-share world_modeling_bringup)/config/eidos.yaml
      description: Path to the eidos parameter file


  # Just Eidos
  - node:
      pkg: eidos
      exec: eidos_node
      name: eidos_node
      output: screen
      param:
        - from: $(var eidos_config_file)
        - name: use_sim_time
          value: true

  # Localization: EKF Local (odom -> base_footprint)
  - node:
      pkg: robot_localization
      exec: ekf_node
      name: ekf_filter_node_local
      output: screen
      param:
        - from: $(var eidos_config_file)
        - name: use_sim_time
          value: true
      remap:
        - from: odometry/filtered
          to: /localization/odometry/filtered/local

  # Localization: EKF Global (map -> odom)
  - node:
      pkg: robot_localization
      exec: ekf_node
      name: ekf_filter_node_global
      output: screen
      param:
        - from: $(var eidos_config_file)
        - name: use_sim_time
          value: true
      remap:
        - from: odometry/filtered
          to: /localization/odometry/filtered/global

  # Eve Robot Description
  - include:
      file: "$(find-pkg-share eve_description)/launch/tf_publish.yaml"

  # Lifecycle Manager
  - node:
      pkg: wato_lifecycle_manager
      exec: wato_lifecycle_manager_node
      name: eidos_lifecycle_manager
      output: screen
      param:
        - name: node_names
          value:
            - /eidos_node
        - name: autostart
          value: true
        - name: transition_timeout_s
          value: 10.0
        - name: bond_timeout_s
          value: 4.0
        - name: bond_enabled
          value: false
