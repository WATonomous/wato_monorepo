# Full world modeling stack with eidos SLAM/localization.
#
# Usage:
#   Localization on Test track (live):   ros2 launch world_modeling_bringup world_model.launch.yaml eidos_map_path:=/opt/watonomous/maps/test_track_map/eidos_map/wrestrc.map
#   Localization (bag):  ros2 launch world_modeling_bringup world_model.launch.yaml eidos_map_path:=/opt/watonomous/maps/test_track_map/eidos_map/wrestrc.map use_sim_time:=true
#   Mapping (bag):       ros2 launch world_modeling_bringup world_model.launch.yaml mapping:=true use_sim_time:=true
#   Static ego pose:     ros2 launch world_modeling_bringup world_model.launch.yaml run_localization:=false use_static_ego_pose:=true static_ego_x:=0.0 static_ego_y:=0.0 static_ego_yaw:=0.0 use_sim_time:=true
---
launch:
  - arg:
      name: mapping
      default: "false"
      description: "Run in mapping mode (eidos only, no planning/costmap stack)"

  - arg:
      name: config_file
      default: $(find-pkg-share world_modeling_bringup)/config/world_model_test_track.yaml
      description: Path to the world_model configuration file

  - arg:
      name: eidos_map_path
      default: ""
      description: Path to the .map file for localization. Empty string skips loading.

  - arg:
      name: use_sim_time
      default: "false"
      description: Use simulation time from /clock topic

  - arg:
      name: run_localization
      default: "true"
      description: "Run eidos localization nodes. Disable this for a fixed/static ego pose."

  - arg:
      name: use_static_ego_pose
      default: "false"
      description: "Publish a fixed map/odom/base_footprint pose instead of running localization."

  - arg:
      name: static_ego_x
      default: "0.0"
      description: "Fixed ego x position in map/odom frame."

  - arg:
      name: static_ego_y
      default: "0.0"
      description: "Fixed ego y position in map/odom frame."

  - arg:
      name: static_ego_z
      default: "0.0"
      description: "Fixed ego z position in map/odom frame."

  - arg:
      name: static_ego_roll
      default: "0.0"
      description: "Fixed ego roll in radians."

  - arg:
      name: static_ego_pitch
      default: "0.0"
      description: "Fixed ego pitch in radians."

  - arg:
      name: static_ego_yaw
      default: "0.0"
      description: "Fixed ego yaw in radians."

  - arg:
      name: static_ego_rate_hz
      default: "10.0"
      description: "Publish rate for fixed ego odometry topics."

  - arg:
      name: autostart
      default: "true"
      description: Automatically configure and activate managed nodes

  - arg:
      name: bond_enabled
      default: "false"
      description: Enable bond-based crash detection

  - arg:
      name: log_bt
      default: "info"
      description: Log level for behaviour_node

  # ---- Autonomy stack (localization mode only) ----

  # Prediction - generates trajectory hypotheses for tracked objects
  # - node:
  #     pkg: prediction
  #     exec: prediction_node
  #     name: prediction_node
  #     namespace: "world_modeling"
  #     output: screen
  #     param:
  #       - from: $(find-pkg-share prediction)/config/params.yaml
  #     remap:
  #       - from: tracks_3d
  #         to: /perception/tracked_detections_3d
  #       - from: ego_pose
  #         to: /localization/pose
  #       - from: lanelet_ahead
  #         to: lanelet/lanelet_ahead

  # World Model
  - node:
      unless: "$(var mapping)"
      pkg: world_model
      exec: world_model_node
      name: world_model
      namespace: "world_modeling"
      output: screen
      param:
        - from: $(var config_file)
      remap:
        - from: "world_objects"
          to: "world_objects_enriched"
        - from: "lane_context"
          to: "lanelet/lane_context"
        - from: "map_visualization"
          to: "lanelet/map_visualization"
        - from: "route_ahead"
          to: "lanelet/route_ahead"
        - from: "lanelet_ahead"
          to: "lanelet/lanelet_ahead"

  # Lanelet Visualization Markers
  - node:
      unless: "$(var mapping)"
      pkg: lanelet_markers
      exec: map_viz_markers_node
      name: map_viz_markers_node
      namespace: "world_modeling"
      output: screen
      param:
        - from: $(var config_file)
      remap:
        - from: "lane_context"
          to: "lanelet/lane_context"
        - from: "map_visualization"
          to: "lanelet/map_visualization"
        - from: "markers"
          to: "lanelet/map_viz_markers"

  - node:
      unless: "$(var mapping)"
      pkg: lanelet_markers
      exec: lane_context_markers_node
      name: lane_context_markers_node
      namespace: "world_modeling"
      output: screen
      param:
        - from: $(var config_file)
      remap:
        - from: "lane_context"
          to: "lanelet/lane_context"
        - from: "markers"
          to: "lanelet/lane_context_markers"

  - node:
      unless: "$(var mapping)"
      pkg: lanelet_markers
      exec: route_ahead_markers_node
      name: route_ahead_markers_node
      namespace: "world_modeling"
      output: screen
      param:
        - from: $(var config_file)
      remap:
        - from: "route_ahead"
          to: "lanelet/route_ahead"
        - from: "markers"
          to: "lanelet/route_ahead_markers"

  - node:
      unless: "$(var mapping)"
      pkg: lanelet_markers
      exec: area_occupancy_markers_node
      name: area_occupancy_markers_node
      namespace: "world_modeling"
      output: screen
      param:
        - from: $(var config_file)
      remap:
        - from: "area_occupancy"
          to: "area_occupancy"
        - from: "markers"
          to: "area_occupancy_markers"

  - node:
      unless: "$(var mapping)"
      pkg: lanelet_markers
      exec: lanelet_ahead_markers_node
      name: lanelet_ahead_markers_node
      namespace: "world_modeling"
      output: screen
      param:
        - from: $(var config_file)
      remap:
        - from: "lanelet_ahead"
          to: "lanelet/lanelet_ahead"
        - from: "markers"
          to: "lanelet/lanelet_ahead_markers"

  # World Model Visualization Markers (pre-enrichment)
  - node:
      unless: "$(var mapping)"
      pkg: world_model_markers
      exec: world_objects_markers_node
      name: world_objects_markers_seed_node
      namespace: "world_modeling"
      output: screen
      param:
        - from: $(var config_file)
      remap:
        - from: "world_objects"
          to: "world_object_seeds"
        - from: "markers"
          to: "world_object_seeds_markers"

  # World Model Visualization Markers (post-enrichment)
  - node:
      unless: "$(var mapping)"
      pkg: world_model_markers
      exec: world_objects_markers_node
      name: world_objects_markers_node
      namespace: "world_modeling"
      output: screen
      param:
        - from: $(var config_file)
      remap:
        - from: "world_objects"
          to: "world_objects_enriched"
        - from: "markers"
          to: "world_objects_enriched_markers"

  # Costmap
  - node:
      unless: "$(var mapping)"
      pkg: costmap
      exec: costmap_node
      name: costmap_node
      namespace: "world_modeling"
      output: screen
      param:
        - from: $(var config_file)
      remap:
        - from: world_objects
          to: world_objects_enriched
        - from: costmap
          to: costmap
        - from: pointcloud
          to: /perception/non_ground_cloud
        - from: footprint
          to: costmap_footprint
        - from: spawn_wall
          to: spawn_wall
        - from: despawn_wall
          to: despawn_wall

  # Costmap Footprint Markers
  - node:
      unless: "$(var mapping)"
      pkg: costmap_markers
      exec: costmap_markers_node
      name: costmap_markers_node
      namespace: "world_modeling"
      output: screen
      param:
        - from: $(var config_file)
      remap:
        - from: footprint
          to: costmap_footprint
        - from: markers
          to: costmap_footprint_markers

  # Behaviour
  - node:
      unless: "$(var mapping)"
      pkg: behaviour
      exec: behaviour_node
      name: behaviour_node
      namespace: "world_modeling"
      output: screen
      param:
        - from: $(find-pkg-share behaviour)/config/params.yaml
      ros_args: "--log-level world_modeling.behaviour_node:=$(var log_bt)"
      remap:
        - from: execute_behaviour
          to: /behaviour/execute_behaviour
          # reset behaviour tree service
        - from: reset_bt
          to: reset_bt
        - from: route_ahead
          to: lanelet/route_ahead
        - from: lane_context
          to: lanelet/lane_context
        - from: world_objects
          to: world_objects
        - from: area_occupancy
          to: area_occupancy
        - from: goal_point
          to: /clicked_point
        - from: ego/odom
          to: /world_modeling/liso/odometry

  # Behaviour Tree visualization markers
  - node:
      unless: "$(var mapping)"
      pkg: behaviour_markers
      exec: behaviour_markers_node
      name: behaviour_markers_node
      namespace: "world_modeling"
      output: screen
      param:
        - from: $(find-pkg-share behaviour_markers)/config/behaviour_markers.yaml
      remap:
        - from: execute_behaviour
          to: /behaviour/execute_behaviour
        - from: route_ahead
          to: lanelet/route_ahead
        - from: lanelet_ahead
          to: lanelet/lanelet_ahead
        - from: lane_context
          to: lanelet/lane_context
        - from: markers
          to: behaviour_markers

  # ---- Eidos Transform + Eidos (mapping mode) ----

  - node:
      if: "$(var mapping)"
      pkg: eidos_transform
      exec: eidos_transform_node
      name: eidos_transform_node
      namespace: "world_modeling"
      output: screen
      param:
        - from: $(find-pkg-share world_modeling_bringup)/config/eidos_slam.yaml
        - name: use_sim_time
          value: $(var use_sim_time)

  - node:
      if: "$(var mapping)"
      pkg: eidos
      exec: eidos_node
      name: eidos_node
      namespace: "world_modeling"
      output: screen
      param:
        - from: $(find-pkg-share world_modeling_bringup)/config/eidos_slam.yaml
        - name: use_sim_time
          value: $(var use_sim_time)

  # ---- Eidos Transform + Eidos (localization mode) ----

  - node:
      if: "$(var run_localization)"
      pkg: eidos_transform
      exec: eidos_transform_node
      name: eidos_transform_node
      namespace: "world_modeling"
      output: screen
      param:
        - from: $(find-pkg-share world_modeling_bringup)/config/eidos_localization.yaml
        - name: use_sim_time
          value: $(var use_sim_time)

  - node:
      if: "$(var run_localization)"
      pkg: eidos
      exec: eidos_node
      name: eidos_node
      namespace: "world_modeling"
      output: screen
      param:
        - from: $(find-pkg-share world_modeling_bringup)/config/eidos_localization.yaml
        - name: use_sim_time
          value: $(var use_sim_time)
        - name: map.load_path
          value: $(var eidos_map_path)

  # ---- Fixed Ego Pose (localization disabled) ----
  #
  # Use with:
  #   run_localization:=false use_static_ego_pose:=true
  #
  # Also exclude conflicting bag topics, especially /tf and any recorded
  # world_modeling odometry topics.
  - node:
      if: "$(var use_static_ego_pose)"
      pkg: tf2_ros
      exec: static_transform_publisher
      name: static_utm_to_map
      output: screen
      args: "--x 0.0 --y 0.0 --z 0.0 --yaw 0.0 --pitch 0.0 --roll 0.0 --frame-id utm --child-frame-id map"

  - node:
      if: "$(var use_static_ego_pose)"
      pkg: tf2_ros
      exec: static_transform_publisher
      name: static_map_to_odom
      output: screen
      args: "--x 0.0 --y 0.0 --z 0.0 --yaw 0.0 --pitch 0.0 --roll 0.0 --frame-id map --child-frame-id odom"

  - node:
      if: "$(var use_static_ego_pose)"
      pkg: tf2_ros
      exec: static_transform_publisher
      name: static_base_footprint_to_base_link
      output: screen
      args: "--x 0.0 --y 0.0 --z 0.0 --yaw 0.0 --pitch 0.0 --roll 0.0 --frame-id base_footprint --child-frame-id base_link"

  - node:
      if: "$(var use_static_ego_pose)"
      pkg: world_modeling_bringup
      exec: fixed_ego_odometry.py
      name: fixed_ego_odometry
      namespace: "world_modeling"
      output: screen
      param:
        - name: use_sim_time
          value: $(var use_sim_time)
        - name: rate_hz
          value: $(var static_ego_rate_hz)
        - name: x
          value: $(var static_ego_x)
        - name: y
          value: $(var static_ego_y)
        - name: z
          value: $(var static_ego_z)
        - name: roll
          value: $(var static_ego_roll)
        - name: pitch
          value: $(var static_ego_pitch)
        - name: yaw
          value: $(var static_ego_yaw)
        - name: map_frame
          value: "map"
        - name: odom_frame
          value: "odom"
        - name: base_frame
          value: "base_footprint"
        - name: map_topic
          value: "liso/odometry"
        - name: odom_topic
          value: "transform/odometry"
        - name: slam_topic
          value: "slam/odometry"
        - name: pose_topic
          value: "fixed_ego_pose"

  # ---- Lifecycle Manager ----

  # Full stack lifecycle (localization mode)
  # eidos_transform activates first (broadcasts identity TF), then eidos
  - node:
      if: "$(var run_localization)"
      pkg: wato_lifecycle_manager
      exec: wato_lifecycle_manager_node
      name: world_modeling_lifecycle_manager
      namespace: "world_modeling"
      output: screen
      param:
        - name: node_names
          value:
            - /world_modeling/eidos_transform_node
            # - /world_modeling/prediction_node
            - /world_modeling/world_model
            - /world_modeling/costmap_node
            - /world_modeling/eidos_node
        - name: autostart
          value: $(var autostart)
        - name: transition_timeout_s
          value: 10.0
        - name: bond_timeout_s
          value: 4.0
        - name: bond_enabled
          value: $(var bond_enabled)

  - node:
      if: "$(var use_static_ego_pose)"
      pkg: wato_lifecycle_manager
      exec: wato_lifecycle_manager_node
      name: world_modeling_static_lifecycle_manager
      namespace: "world_modeling"
      output: screen
      param:
        - name: node_names
          value:
            - /world_modeling/world_model
            - /world_modeling/costmap_node
        - name: autostart
          value: $(var autostart)
        - name: transition_timeout_s
          value: 10.0
        - name: bond_timeout_s
          value: 4.0
        - name: bond_enabled
          value: $(var bond_enabled)

  # Mapping lifecycle (eidos_transform first, then eidos)
  - node:
      if: "$(var mapping)"
      pkg: wato_lifecycle_manager
      exec: wato_lifecycle_manager_node
      name: eidos_lifecycle_manager
      namespace: "world_modeling"
      output: screen
      param:
        - name: node_names
          value:
            - /world_modeling/eidos_transform_node
            - /world_modeling/eidos_node
        - name: autostart
          value: $(var autostart)
        - name: transition_timeout_s
          value: 10.0
        - name: bond_timeout_s
          value: 4.0
        - name: bond_enabled
          value: false
