eidos_node:
  ros__parameters:
    # ---- Frames ----
    frames:
      base_link: "base_footprint"
      odometry: "odom"
      map: "map"

    # ---- SLAM core ----
    slam_rate: 10.0                    # Hz, main SLAM loop frequency
    max_displacement: 10.0              # meters of travel before creating a new keyframe state
    max_rotation: 0.1                  # radians of rotation before creating a new keyframe state
    relocalization_timeout: 30.0       # seconds without relocalization before fallback to fresh SLAM

    prior:
      pose_cov: [1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2]  # [r, p, y, x, y, z] state 0 prior covariance

    keyframe:
      density: 2.0                    # meters, voxel size for spatial downsampling of keyframe poses
      search_radius: 50.0             # meters, radius for keyframe neighborhood queries

    map:
      load_directory: ""              # if set, load prior map on startup
      save_directory: "/tmp/eidos_maps/"

    performance:
      num_cores: 8                    # number of CPU cores for parallel scan matching

    # ---- Core topics / services ----
    topics:
      pose: "slam/pose"               # geometry_msgs/PoseStamped output (optimized pose in map frame)
      status: "slam/status"            # eidos_msgs/SlamStatus output
      odom: "slam/odometry"            # nav_msgs/Odometry output (optimized pose in map frame)
      save_map_service: "slam/save_map"
      load_map_service: "slam/load_map"

    # -- Published slam/odometry covariance diagonals [x, y, z, roll, pitch, yaw] --
    odom_pose_cov: [1.0e-3, 1.0e-3, 1.0e-3, 1.0e-4, 1.0e-4, 1.0e-4]

    # ---- Plugin lists ----
    factor_plugins:
      # - "gps_factor"
      - "liso_factor"
      # - "euclidean_distance_loop_closure_factor"

    # relocalization_plugins:
    #   - "gps_icp_relocalization"

    visualization_plugins:
      - "keyframe_map_visualization"
      - "gps_visualization"
      - "loop_closure_visualization"
      - "keyframe_pose_visualization"
      - "factor_graph_visualization"

    # ==========================================================================
    # Motion Model
    # ==========================================================================
    motion_model:
      plugin: "eidos::ImuMotionModel"

      # -- Topics --
      imu_topic: "/novatel/oem7/imu/data"                                        # sensor_msgs/Imu input (9-DOF, gravity-compensated)
      odom_incremental_topic: "motion_model/odometry/imu_incremental"            # nav_msgs/Odometry output (raw IMU prediction)
      odom_fused_topic: "motion_model/odometry/imu"                              # nav_msgs/Odometry output (graph-corrected + IMU-incremented)

      # -- Frames --
      imu_frame: "imu_link"

      # -- IMU model --
      # Epson EG320N datasheet: VRW=0.05 m/s/√hr → 6.9e-7, ARW=0.1 °/√hr → 8.5e-10
      # Bias instability: accel=0.1mg → 9.6e-7, gyro=3.5°/hr → 2.9e-10
      acc_cov: [6.9e-7, 6.9e-7, 6.9e-7]           # accelerometer covariance diagonal (m/s^2)^2
      gyr_cov: [8.5e-10, 8.5e-10, 8.5e-10]        # gyroscope covariance diagonal (rad/s)^2
      bias_walk_cov: [9.6e-7, 9.6e-7, 9.6e-7, 2.9e-10, 2.9e-10, 2.9e-10]  # [ax, ay, az, gx, gy, gz] bias random-walk covariance
      gravity: 0.0                                   # 0.0 because the data topic provides gravity-compensated acceleration
      integration_cov: [1.0e-8, 1.0e-8, 1.0e-8]    # preintegration position covariance diagonal
      default_imu_dt: 0.002                          # seconds (1/500 Hz)

      # -- Initialization (warmup + state 0 priors) --
      initialization:
        prior_vel_cov: [1.0e-16, 1.0e-16, 1.0e-16]                       # [vx, vy, vz] — car assumed stationary at startup
        prior_bias_cov: [1.0e-6, 1.0e-6, 1.0e-6, 1.0e-6, 1.0e-6, 1.0e-6] # [ax, ay, az, gx, gy, gz] — initial IMU bias
        stationary_acc_threshold: 0.05         # m/s^2, RMS linear acceleration must be below this
        stationary_gyr_threshold: 0.005        # rad/s, RMS angular velocity must be below this
        stationary_samples: 200               # number of recent IMU samples to check (~0.4s at 500 Hz)
        quaternion_norm_threshold: 0.1

      # -- Published odometry covariance diagonals [x, y, z, roll, pitch, yaw] --
      odom_pose_cov: [0.3, 0.3, 0.3, 0.1, 0.1, 0.1]
      odom_twist_cov: [0.1, 0.1, 0.1, 0.15, 0.15, 0.15]

    # ==========================================================================
    # GPS Factor
    # ==========================================================================
    gps_factor:
      plugin: "eidos::GpsFactor"

      # -- Topics --
      gps_topic: "/novatel/oem7/fix"      # sensor_msgs/NavSatFix input

      # -- GPS quality filtering --
      cov_threshold: 5.0            # max GPS position covariance to accept a measurement
      use_elevation: false           # use GPS elevation (z), or lock z to current pose

      # -- GPS injection control --
      min_gps_movement: 20.0          # meters, minimum displacement between GPS injections

      # -- Covariances --
      gps_cov: [2.0, 2.0, 100.0]   # [x, y, z] BiasedGPSFactor measurement covariance floor (m^2)

      # -- Initialization (heading alignment + UTM→map bias prior) --
      initialization:
        imu_topic: "/novatel/oem7/imu/data"          # sensor_msgs/Imu input (orientation for heading alignment)
        bias_prior_cov: [1.0e4, 1.0e4, 1.0e4]       # [x, y, z] utm→map bias prior covariance

    # ==========================================================================
    # LISO Factor (LiDAR-Inertial Submap Odometry)
    # ==========================================================================
    liso_factor:
      plugin: "eidos::LisoFactor"

      # -- Topics --
      lidar_topic: "/lidar_cc/velodyne_points"
      odom_topic: "liso/odometry"
      imu_topic: "/novatel/oem7/imu/data"

      # -- Frames --
      lidar_frame: "lidar_cc"
      imu_frame: "imu_link"

      # -- Initialization (IMU warmup + first state anchoring) --
      initialization:
        warmup_samples: 200                    # consecutive stationary IMU samples required (~0.4s at 500Hz)
        stationary_gyr_threshold: 0.005        # rad/s, angular velocity magnitude below this = stationary
        first_state_prior_cov: [0.1, 0.1, 0.1, 1.0, 1.0, 1.0]  # [r,p,y,x,y,z] anchors first LISO state

      # -- Downsampling --
      scan_ds_resolution: 0.5
      submap_ds_resolution: 0.5
      num_neighbors: 10

      # -- Submap assembly (graph BFS) --
      submap_radius: 30.0
      max_submap_states: 25

      # -- Registration (small_gicp GICP) --
      max_correspondence_distance: 2.0
      max_iterations: 20
      num_threads: 16

      # -- Quality filtering --
      min_inliers: 50
      min_noise: 0.01
      min_scan_distance: 5.0        # meters, minimum displacement between LISO factor injections

      # -- Published odometry covariance diagonals [x, y, z, roll, pitch, yaw] --
      odom_pose_cov: [0.01, 0.01, 0.01, 0.005, 0.005, 0.005]

    # ==========================================================================
    # Euclidean Distance Loop Closure Factor
    # ==========================================================================
    euclidean_distance_loop_closure_factor:
      plugin: "eidos::EuclideanDistanceLoopClosureFactor"
      frequency: 1.0                # Hz, loop closure detection frequency
      search_radius: 15.0           # meters, radius to search for loop closure candidates
      search_time_diff: 30.0        # seconds, minimum time gap between current and candidate keyframe
      search_num: 25                # number of nearby keyframes to assemble into candidate submap
      fitness_score: 0.3            # max ICP fitness score to accept a loop closure
      pointcloud_from: "liso_factor"  # which factor plugin provides the keyframe point clouds

    # ==========================================================================
    # GPS + ICP Relocalization
    # ==========================================================================
    gps_icp_relocalization:
      plugin: "eidos::GpsIcpRelocalization"
      gps_topic: "/novatel/oem7/fix"             # sensor_msgs/NavSatFix input
      gps_candidate_radius: 30.0    # meters, radius to search for prior map keyframes near GPS
      fitness_threshold: 0.3        # max ICP fitness score to accept relocalization
      max_icp_iterations: 100       # maximum ICP iterations
      submap_leaf_size: 0.4         # meters, voxel downsampling for the assembled prior submap
      max_correspondence_distance: 2.0  # meters, max point correspondence distance for ICP
      num_threads: 4                # number of threads for small_gicp ICP
      pointcloud_from: ""  # which factor plugin provides keyframe point clouds
      gps_from: "gps_factor"        # which factor plugin provides GPS keyframe positions

    # ==========================================================================
    # Keyframe Map Visualization
    # ==========================================================================
    keyframe_map_visualization:
      plugin: "eidos::KeyframeMapVisualization"
      topic: "slam/visualization/map"
      pointcloud_from: "liso_factor"
      voxel_leaf_size: 0.4
      publish_rate: 1.0

    # ==========================================================================
    # GPS Visualization
    # ==========================================================================
    gps_visualization:
      plugin: "eidos::GpsVisualization"
      topic: "slam/visualization/gps"
      gps_from: "gps_factor"
      marker_scale: 1.0

    # ==========================================================================
    # Loop Closure Visualization
    # ==========================================================================
    loop_closure_visualization:
      plugin: "eidos::LoopClosureVisualization"
      topic: "slam/visualization/loop_closures"
      loop_closure_from: "euclidean_distance_loop_closure_factor"
      line_width: 0.1

    # ==========================================================================
    # Keyframe Pose Visualization
    # ==========================================================================
    keyframe_pose_visualization:
      plugin: "eidos::KeyframePoseVisualization"
      topic: "slam/visualization/poses"
      axis_length: 0.5
      axis_width: 0.05

    # ==========================================================================
    # Factor Graph Visualization
    # ==========================================================================
    factor_graph_visualization:
      plugin: "eidos::FactorGraphVisualization"
      topic: "slam/visualization/factor_graph"
      state_scale: 1.0
      line_width: 0.5

# ==========================================================================
# robot_localization dual-EKF
# ==========================================================================
ekf_filter_node_local:
  ros__parameters:
    frequency: 100.0
    two_d_mode: false
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom
    publish_tf: true

    # Eidos IMU preintegrated odometry — full pose + velocity
    odom0: motion_model/odometry/imu
    odom0_config: [true,true,true, true,true,true, true,true,true, true,true,true, false,false,false]

ekf_filter_node_global:
  ros__parameters:
    frequency: 20.0
    two_d_mode: false
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: map
    publish_tf: true

    # Eidos IMU preintegrated odometry — position + orientation (differential) + velocity
    # Differential orientation: only rotation deltas, so SLAM sets the absolute heading
    # and IMU fills in smooth changes between SLAM updates without double-counting
    odom0: motion_model/odometry/imu
    odom0_config: [true,true,true, true,true,true, true,true,true, false,false,false, false,false,false]
    odom0_differential: true

    # Eidos graph-optimized pose (absolute, in map frame) — position + orientation
    odom1: slam/odometry
    odom1_config: [true,true,true, true,true,true, false,false,false, false,false,false, false,false,false]

    # LISO LiDAR odometry (absolute, in map frame) — position + orientation
    odom2: liso/odometry
    odom2_config: [true,true,true, true,true,true, false,false,false, false,false,false, false,false,false]
