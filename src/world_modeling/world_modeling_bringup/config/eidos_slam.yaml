/**/eidos_node:
  ros__parameters:
    # ---- Frames ----
    frames:
      base_link: "base_footprint"
      odometry: "odom"
      map: "map"

    # ---- TransformManager ----
    transforms:
      odom_source: "liso_factor"   # fuse LISO odom with motion model via EKF
      map_source: "slam_core"      # Estimator optimized pose (graph-corrected)
      rate: 500.0                  # TransformManager timer rate (Hz)
      fusion:
        # EKF noise params [roll, pitch, yaw, x, y, z]
        # process_noise: per-tick MM prediction uncertainty. Higher = trust MM less.
        process_noise: [1.0e-6, 1.0e-6, 1.0e-6, 1.0e-4, 1.0e-4, 1.0e-4]
        # measurement_noise: LISO odom correction uncertainty. Lower = trust LISO more.
        measurement_noise: [1.0e-4, 1.0e-4, 1.0e-4, 1.0e-2, 1.0e-2, 1.0e-2]

    # ---- Core ----
    slam_rate: 10.0
    relocalization_timeout: 30.0

    # ---- ISAM2 optimizer ----
    isam2:
      update_iterations: 2
      correction_iterations: 5
      loop_closure_iterations: 5
      relinearize_threshold: 0.01
      relinearize_skip: 1

    prior:
      pose_cov: [1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2, 1.0e-2]

    map:
      load_path: ""
      save_path: "/opt/watonomous/maps/wrestrc.map"

    # ---- Core topics / services ----
    topics:
      pose: "slam/pose"
      status: "slam/status"
      odom: "slam/odometry"
      save_map_service: "slam/save_map"
      load_map_service: "slam/load_map"

    odom_pose_cov: [1.0e-3, 1.0e-3, 1.0e-3, 1.0e-4, 1.0e-4, 1.0e-4]

    # ---- Plugin lists ----
    factor_plugins:
      - "gps_factor"
      - "liso_factor"
      - "euclidean_distance_loop_closure_factor"

    relocalization_plugins:
      - "gps_icp_relocalization"

    visualization_plugins:
      - "keyframe_map_visualization"
      - "factor_graph_visualization"

    # ==========================================================================
    # Motion Model (pure odom filler — no factor graph involvement)
    # ==========================================================================
    motion_model:
      plugin: "eidos::ImuMotionModel"

      imu_topic: "/novatel/oem7/imu/data"
      odom_topic: "motion_model/odometry/imu_incremental"
      imu_frame: "imu_link"

      acc_cov: [6.9e-7, 6.9e-7, 6.9e-7]
      gyr_cov: [8.5e-10, 8.5e-10, 8.5e-10]
      gravity: 0.0
      integration_cov: [1.0e-8, 1.0e-8, 1.0e-8]
      default_imu_dt: 0.002

      initialization:
        stationary_acc_threshold: 0.05
        stationary_gyr_threshold: 0.005
        stationary_samples: 200
        quaternion_norm_threshold: 0.1

      odom_pose_cov: [0.3, 0.3, 0.3, 0.1, 0.1, 0.1]
      odom_twist_cov: [0.1, 0.1, 0.1, 0.15, 0.15, 0.15]

    # ==========================================================================
    # GPS Factor
    # ==========================================================================
    gps_factor:
      plugin: "eidos::GpsFactor"

      gps_topic: "/novatel/oem7/fix"
      imu_topic: "/novatel/oem7/imu/data"

      add_factors: true
      max_cov: 5.0
      use_elevation: true
      min_radius: 150.0
      pose_cov_threshold: 1.0
      gps_cov: [2.0, 2.0, 4.0]

    # ==========================================================================
    # LISO Factor
    # ==========================================================================
    liso_factor:
      plugin: "eidos::LisoFactor"
      add_factors: true
      submap_source: "recent_keyframes"

      lidar_topic: "/lidar_cc/velodyne_points"
      odom_topic: "liso/odometry"
      odometry_incremental_topic: "liso/odometry_incremental"
      imu_topic: "/novatel/oem7/imu/data"

      lidar_frame: "lidar_cc"
      imu_frame: "imu_link"

      initialization:
        warmup_samples: 200
        stationary_gyr_threshold: 0.005

      scan_ds_resolution: 0.5
      submap_ds_resolution: 0.5
      num_neighbors: 10
      submap_radius: 20.0
      max_submap_states: 10

      max_correspondence_distance: 2.0
      max_iterations: 20
      num_threads: 16

      min_inliers: 50
      min_noise: 0.01
      min_scan_distance: 5.0

      odom_pose_cov: [0.01, 0.01, 0.005, 1.0e-6, 1.0e-6, 1.0e-3]
      odom_twist_cov: [1.0e-4, 1.0e-4, 1.0e-8, 1.0e-10, 1.0e-10, 1.0e-6]

    # ==========================================================================
    # Euclidean Distance Loop Closure Factor
    # ==========================================================================
    euclidean_distance_loop_closure_factor:
      plugin: "eidos::EuclideanDistanceLoopClosureFactor"
      frequency: 1.0
      search_radius: 20.0
      search_time_diff: 80.0
      search_num: 15
      min_inlier_ratio: 0.3

      submap_radius: 25.0
      submap_leaf_size: 0.4
      max_correspondence_distance: 2.0
      max_iterations: 100
      num_threads: 16

      num_neighbors: 10
      loop_closure_cov: [1.0e-4, 1.0e-4, 1.0e-8, 1.0e-10, 1.0e-10, 1.0e-6]

      gicp_pointcloud_from: "liso_factor/gicp_cloud"

    # ==========================================================================
    # GPS + ICP Relocalization
    # ==========================================================================
    gps_icp_relocalization:
      plugin: "eidos::GpsIcpRelocalization"

      gps_topic: "/novatel/oem7/fix"
      lidar_topic: "/lidar_cc/velodyne_points"
      imu_topic: "/novatel/oem7/imu/data"

      lidar_frame: "lidar_cc"
      imu_frame: "imu_link"

      gps_candidate_radius: 30.0
      pointcloud_from: "liso_factor/cloud"
      gps_from: "gps_factor"

      scan_ds_resolution: 0.5
      submap_leaf_size: 0.4
      max_correspondence_distance: 2.0
      max_icp_iterations: 100
      num_threads: 16
      num_neighbors: 10

      fitness_threshold: 0.3

    # ==========================================================================
    # Keyframe Map Visualization
    # ==========================================================================
    keyframe_map_visualization:
      plugin: "eidos::KeyframeMapVisualization"
      topic: "slam/visualization/map"
      pointcloud_from: "liso_factor/cloud"
      voxel_leaf_size: 0.4
      publish_rate: 1.0
      mode: "accumulate"

      accumulate:
        skip_factor: 20

      windowed:
        radius: 50.0

    # ==========================================================================
    # Factor Graph Visualization
    # ==========================================================================
    factor_graph_visualization:
      plugin: "eidos::FactorGraphVisualization"
      topic: "slam/visualization/factor_graph"
      state_scale: 1.0
      line_width: 0.5
      publish_rate: 1.0
      mode: "full"
      window_radius: 50.0
